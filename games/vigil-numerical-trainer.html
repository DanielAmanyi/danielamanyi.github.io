<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vigil — Numerical Comprehension</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1D2129;
    --panel: #262B34;
    --panel-inset: #14171D;
    --border: #383F4C;
    --text: #ECE8DE;
    --text-muted: #8A93A6;
    --gold: #D9A441;
    --teal: #4FA8A0;
    --coral: #C1554A;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image: radial-gradient(circle at 15% 8%, rgba(217,164,65,0.05), transparent 40%),
                       radial-gradient(circle at 85% 90%, rgba(79,168,160,0.06), transparent 45%);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  :focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }
  .app-shell{ display:flex; gap:24px; max-width:1200px; margin:0 auto; padding: 28px 20px 60px; align-items:flex-start; }
  .main-col{ flex:1 1 auto; min-width:0; max-width:680px; margin:0 auto; }
  header.top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 22px; gap:12px; }
  #sidebar-toggle{ display:none; background: var(--panel-inset); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:12px 16px; font-size:13px; font-family:var(--font-body); cursor:pointer; white-space:nowrap; min-height:44px; }
  #sidebar-toggle:hover{ border-color: var(--gold); }
  .sidebar{ width:300px; flex-shrink:0; }
  .sidebar-backdrop{ display:none; }
  .resume-banner-row{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  @media (max-width: 959px){
    #sidebar-toggle{ display:inline-block; }
    .sidebar{
      position: fixed; top:0; right:0; height:100vh; width:min(320px,86vw);
      background: var(--panel); border-left:1px solid var(--border);
      transform: translateX(100%); transition: transform 0.25s ease;
      z-index: 40; padding: 20px; overflow-y:auto; margin:0;
    }
    .sidebar.open{ transform: translateX(0); }
    .sidebar-backdrop{
      display:block; position:fixed; inset:0; background:rgba(0,0,0,0.5);
      opacity:0; pointer-events:none; transition:opacity 0.25s ease; z-index:30;
    }
    .sidebar-backdrop.show{ opacity:1; pointer-events:auto; }
  }
  .brand{ font-family: var(--font-display); font-weight:700; font-size: 22px; letter-spacing: 0.02em; }
  .brand span{ color: var(--gold); }
  .eyebrow{ font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
  .panel{ background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .panel h2{ font-family: var(--font-display); font-size: 15px; margin: 0 0 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;}

  .overview-grid{ display:flex; align-items:center; gap: 22px; }
  .overview-num{ font-family: var(--font-display); font-size: 40px; font-weight:700; line-height:1; }
  .overview-sub{ font-size: 12px; color: var(--text-muted); margin-top:4px; }
  .spark{ flex:1; }
  .spark svg{ width:100%; height: 46px; display:block; }

  .type-row{ display:flex; align-items:center; gap: 10px; font-size: 13px; margin-bottom: 10px; }
  .type-row:last-child{ margin-bottom:0; }
  .type-label{ width: 150px; flex-shrink:0; color: var(--text-muted); }
  .type-bar-track{ flex:1; height:8px; background: var(--panel-inset); border-radius: 4px; overflow:hidden; border:1px solid var(--border); }
  .type-bar-fill{ height:100%; border-radius:4px; background: var(--teal); transition: width 0.5s ease; }
  .type-pct{ width: 84px; text-align:right; color: var(--text-muted); font-family: var(--font-mono); font-size:12px; }

  .diff-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (min-width: 480px){ .diff-grid{ grid-template-columns: repeat(4, 1fr); } }
  .diff-btn{ background: var(--panel-inset); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; color: var(--text); font-family: var(--font-body); cursor:pointer; text-align:left; transition: border-color 0.15s ease, transform 0.1s ease; }
  .diff-btn:hover{ border-color: var(--gold); }
  .diff-btn:active{ transform: scale(0.98); }
  .diff-btn .dname{ font-weight:600; font-size:14px; display:block; margin-bottom:4px; }
  .diff-btn .dmeta{ font-size:11px; color: var(--text-muted); font-family: var(--font-mono); }
  .diff-btn.easy .dname{ color: var(--teal); }
  .diff-btn.medium .dname{ color: var(--gold); }
  .diff-btn.hard .dname{ color: var(--coral); }
  .diff-btn.mixed .dname{ color: var(--text); }

  .reset-link{ text-align:center; margin-top: 20px; }
  .reset-link button{ background:none; border:none; color: var(--text-muted); font-size: 12px; text-decoration: underline; cursor:pointer; font-family: var(--font-body); }
  .reset-link button:hover{ color: var(--coral); }

  .session-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 16px; }
  .session-meta{ font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); }
  .session-meta b{ color: var(--text); }
  .gauge-wrap{ position:relative; width:76px; height:76px; text-align:center; }
  .gauge-wrap svg{ transform: rotate(-90deg); }
  .gauge-pct{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:15px; font-weight:700; }
  .gauge-timer{ text-align:center; font-family: var(--font-mono); font-size:11px; color: var(--text-muted); margin-top:4px; }

  .instruction{ font-size: 15px; margin-bottom: 16px; line-height:1.55; }
  .instruction .tag{ display:inline-block; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color: var(--bg); background: var(--gold); padding: 2px 7px; border-radius: 4px; margin-right:8px; font-family: var(--font-body); font-weight:600; vertical-align:middle;}

  .table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom: 18px; }
  .data-table{ width:100%; min-width:420px; border-collapse: collapse; background: var(--panel-inset); border: 1px solid var(--border); border-radius: 10px; overflow:hidden; font-family: var(--font-mono); font-size: 13px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.35); }
  .data-table th, .data-table td{ padding: 9px 12px; text-align:right; border-bottom: 1px solid var(--border); }
  .data-table th:first-child, .data-table td:first-child{ text-align:left; }
  .data-table th{ color: var(--gold); font-weight:600; text-transform:uppercase; font-size:11px; letter-spacing:0.04em; }
  .data-table tr:last-child td{ border-bottom:none; }

  .opt-grid{ display:flex; flex-direction:column; gap: 10px; }
  .opt-btn{
    background: var(--panel-inset); border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 16px; color: var(--text); font-family: var(--font-mono); font-size: 15px;
    text-align:left; cursor:pointer; transition: border-color 0.15s ease, background 0.15s ease;
  }
  .opt-btn:hover:not(.answered *){ border-color: var(--gold); }
  .opt-grid.answered .opt-btn{ cursor:default; }
  .opt-btn.correct{ border-color: var(--teal); background: rgba(79,168,160,0.14); }
  .opt-btn.wrong{ border-color: var(--coral); background: rgba(193,85,74,0.14); }

  .feedback{ margin-top: 16px; padding: 14px 16px; border-radius: 10px; font-size: 14px; line-height:1.5; }
  .feedback.correct{ background: rgba(79,168,160,0.12); border: 1px solid var(--teal); }
  .feedback.wrong{ background: rgba(193,85,74,0.12); border: 1px solid var(--coral); }
  .feedback .verdict{ font-weight:700; margin-bottom:4px; }
  .feedback.correct .verdict{ color: var(--teal); }
  .feedback.wrong .verdict{ color: var(--coral); }
  .feedback .formula{ font-family: var(--font-mono); font-size: 12px; color: var(--gold); margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
  .feedback .explain{ color: var(--text-muted); font-size: 13px; }
  .next-row{ margin-top:14px; display:flex; justify-content:flex-end; }

  .btn{ background: var(--gold); color: #201a0e; border: none; border-radius: 10px; padding: 12px 22px; font-weight: 600; font-family: var(--font-body); cursor: pointer; font-size: 14px; }
  .btn:hover{ filter: brightness(1.08); }
  .btn:active{ transform: scale(0.98); }
  .btn.secondary{ background: var(--panel-inset); color: var(--text); border: 1px solid var(--border); }

  .score-hero{ text-align:center; padding: 10px 0 18px; }
  .score-hero .big{ font-family: var(--font-display); font-size: 52px; font-weight:700; line-height:1; }
  .score-hero .sub{ color: var(--text-muted); font-size: 13px; margin-top: 6px; }
  .delta{ font-family: var(--font-mono); font-size:12px; margin-top:6px; }
  .delta.up{ color: var(--teal); }
  .delta.down{ color: var(--coral); }
  .results-actions{ display:flex; gap:10px; margin-top: 6px; }
  .results-actions .btn{ flex:1; }

  .toast{ position: fixed; left:50%; bottom: 24px; transform: translateX(-50%) translateY(10px); background: var(--panel); border:1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity:0; transition: opacity 0.25s ease, transform 0.25s ease; pointer-events:none; box-shadow: 0 8px 24px rgba(0,0,0,0.3); max-width: 90%; text-align:center; }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  .hidden{ display:none !important; }

  @media (prefers-reduced-motion: reduce){ *{ transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div class="app-shell">
<div class="main-col">
  <header class="top">
    <div>
      <div class="brand">VIGIL<span>.</span></div>
      <div class="eyebrow">Numerical Comprehension</div>
    </div>
    <button id="sidebar-toggle">📊 Stats</button>
  </header>

  <div id="screen-dashboard">
    <div id="resume-banner"></div>

    <div class="panel">
      <h2>Start a session · 10 questions</h2>
      <div class="diff-grid">
        <button class="diff-btn easy" data-diff="easy"><span class="dname">Easy</span><span class="dmeta" id="meta-easy">30 in pool</span></button>
        <button class="diff-btn medium" data-diff="medium"><span class="dname">Medium</span><span class="dmeta" id="meta-medium">30 in pool</span></button>
        <button class="diff-btn hard" data-diff="hard"><span class="dname">Hard</span><span class="dmeta" id="meta-hard">30 in pool</span></button>
        <button class="diff-btn mixed" data-diff="mixed"><span class="dname">Mixed</span><span class="dmeta">All levels</span></button>
      </div>
    </div>

    <div class="reset-link"><button id="btn-reset">Reset all progress</button></div>
  </div>

  <div id="screen-session" class="hidden">
    <div class="session-top">
      <div class="session-meta">
        <div id="sess-diff-label" style="text-transform:uppercase; letter-spacing:0.08em; font-size:12px; color:var(--text-muted);">EASY</div>
        <div>Question <b id="sess-qnum">1</b> / 10</div>
      </div>
      <div>
        <div class="gauge-wrap">
          <svg width="76" height="76" viewBox="0 0 76 76">
            <circle cx="38" cy="38" r="32" fill="none" stroke="#14171D" stroke-width="7"/>
            <circle id="gauge-fill" cx="38" cy="38" r="32" fill="none" stroke="#4FA8A0" stroke-width="7" stroke-linecap="round" stroke-dasharray="201.06" stroke-dashoffset="201.06"/>
          </svg>
          <div class="gauge-pct" id="gauge-pct">—</div>
        </div>
        <div class="gauge-timer" id="q-timer">0.0s</div>
      </div>
    </div>

    <div class="panel">
      <div class="instruction"><span class="tag" id="q-type-tag">TYPE</span><span id="q-prompt"></span></div>
      <div id="q-table-wrap"></div>
      <div class="opt-grid" id="q-options"></div>
      <div id="q-feedback"></div>
    </div>
  </div>

  <div id="screen-results" class="hidden">
    <div class="panel">
      <div class="score-hero">
        <div class="big" id="res-score">0/10</div>
        <div class="sub" id="res-accuracy">0% accuracy</div>
        <div class="sub" id="res-time">Avg 0.0s per question</div>
        <div class="delta" id="res-delta"></div>
      </div>
    </div>
    <div class="panel">
      <h2>This session, by module</h2>
      <div id="res-type-bars"></div>
    </div>
    <div class="results-actions">
      <button class="btn secondary" id="btn-dashboard">Choose difficulty</button>
      <button class="btn" id="btn-again">Run again</button>
    </div>
  </div>
</div>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>
<aside class="sidebar" id="sidebar">
  <div class="panel">
    <h2>Overview</h2>
    <div class="overview-grid">
      <div>
        <div class="overview-num" id="ov-accuracy">—</div>
        <div class="overview-sub" id="ov-sessions">No sessions yet</div>
      </div>
      <div class="spark" id="ov-spark"></div>
    </div>
  </div>
  <div class="panel">
    <h2>Strength by module</h2>
    <div id="type-bars"></div>
  </div>
</aside>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- Seeded RNG (stable bank across reloads) ---------- */
function mulberry32(seed){
  let a = seed;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function randInt(rng, min, max){ return Math.floor(rng() * (max - min + 1)) + min; }
function choice(rng, arr){ return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rngFn){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rngFn() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function round1(x){ return Math.round(x * 10) / 10; }
function gcd(a, b){ return b === 0 ? a : gcd(b, a % b); }
function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function buildOptions(correctVal, distractorVals, formatFn, rng){
  let vals = [correctVal, ...distractorVals.slice(0,3)];
  let strs = vals.map(formatFn);
  for(let i = 1; i < strs.length; i++){
    let guard = 0;
    while(strs.some((s,j) => j !== i && s === strs[i]) && guard < 12){
      vals[i] = vals[i] + (guard % 2 === 0 ? (guard+1) : -(guard+1));
      strs[i] = formatFn(vals[i]);
      guard++;
    }
  }
  const order = shuffle([0,1,2,3], rng);
  const options = order.map(i => strs[i]);
  const correctIndex = order.indexOf(0);
  return { options, correctIndex };
}

/* ---------- Module generators ---------- */
function genPctChange(id, difficulty, rng){
  const kinds = [
    {label:'monthly cloud bill', unit:'$'},
    {label:'AWS monthly bill', unit:'₦'},
    {label:'worker node count', unit:''},
    {label:'request rate', unit:'req/s'},
    {label:'storage usage', unit:'GB'},
    {label:'CI/CD pipeline runtime', unit:'min'},
    {label:'API traffic', unit:'requests'}
  ];
  const kind = choice(rng, kinds);
  const isIncrease = rng() < 0.5;
  let base, changed, correct;
  if(difficulty === 'easy'){
    base = choice(rng, [40,50,60,80,100,120,150,200,250,300,400,500,600,800,1000]);
    const pct = choice(rng, [5,10,15,20,25,30,40,50]);
    const delta = base * pct / 100;
    changed = isIncrease ? base + delta : base - delta;
    correct = pct;
  }else{
    const baseRange = difficulty === 'medium' ? [200,3000] : [300,8000];
    base = randInt(rng, baseRange[0], baseRange[1]);
    const pct = randInt(rng, 4, 60);
    let delta = Math.round(base * pct / 100);
    changed = isIncrease ? base + delta : base - delta;
    if(changed <= 0) changed = Math.max(1, base - Math.round(base*0.5));
    const rawPct = (Math.abs(changed - base) / base) * 100;
    correct = difficulty === 'hard' ? round1(rawPct) : Math.round(rawPct);
  }
  const word = isIncrease ? 'increase' : 'decrease';
  const fmtVal = v => kind.unit === '$' ? '$'+Math.round(v).toLocaleString()
    : kind.unit === '₦' ? '₦'+Math.round(v).toLocaleString()
    : kind.unit ? Math.round(v).toLocaleString()+' '+kind.unit
    : Math.round(v).toLocaleString();
  const prompt = `${cap(kind.label)} went from ${fmtVal(base)} to ${fmtVal(changed)}. By what percentage did it ${word}?`;
  const wrongBase = round1((Math.abs(changed-base)/changed)*100);
  const ratioMistake = round1((changed/base)*100);
  const jitter = (Number.isInteger(correct)?correct:round1(correct)) + choice(rng,[-4,-3,3,4]);
  const fmtPctVal = v => (Number.isInteger(v) ? v : v.toFixed(1)) + '%';
  const { options, correctIndex } = buildOptions(correct, [wrongBase, ratioMistake, jitter], fmtPctVal, rng);
  return { id, module:'pctChange', difficulty, prompt, options, correctIndex,
    formula: `% Change = |New − Old| ÷ Old × 100`,
    explain: `|${Math.round(changed)} − ${Math.round(base)}| ÷ ${Math.round(base)} × 100 = ${fmtPctVal(correct)}.` };
}

function genPctOfQty(id, difficulty, rng){
  const pctSets = {
    easy: [10,20,25,50,75],
    medium: [15,30,35,40,60,65,70,80,85,90],
    hard: [12,18,22,28,33,37,42,58,63,68,73,77,82,88,93]
  };
  const pct = choice(rng, pctSets[difficulty]);
  const kinds = [
    {label:'cloud bill', total: randInt(rng, 200000,1200000), sub:'storage costs', unit:'₦'},
    {label:'AWS monthly bill', total: randInt(rng,150000,900000), sub:'data transfer', unit:'₦'},
    {label:'engineering team', total: randInt(rng,80,500), sub:'Platform Engineers', unit:''},
    {label:'AWS monthly bill', total: randInt(rng,100000,700000), sub:'CloudWatch monitoring costs', unit:'₦'},
    {label:'engineering department', total: randInt(rng,150,600), sub:'employees who completed security training', unit:''},
    {label:'group of SRE-supported servers', total: randInt(rng,200,900), sub:'servers running Linux', unit:''},
    {label:'set of monitored servers', total: randInt(rng,500,3000), sub:'healthy servers', unit:''},
    {label:'storage cluster', total: randInt(rng,2000,9000), sub:'GB in use', unit:'GB'}
  ];
  const kind = choice(rng, kinds);
  if(difficulty === 'easy') kind.total = Math.round(kind.total/100)*100;
  const raw = kind.total * pct / 100;
  const correct = Math.round(raw);
  const complement = kind.total - correct;
  const fmt = v => kind.unit === '₦' ? '₦'+Math.round(v).toLocaleString()
    : kind.unit === 'GB' ? Math.round(v).toLocaleString()+' GB'
    : Math.round(v).toLocaleString();
  const totalDisplay = fmt(kind.total);
  const prompt = `A ${kind.label} is ${totalDisplay}. ${pct}% of it is ${kind.sub}. How much is ${kind.sub}?`;
  const { options, correctIndex } = buildOptions(correct, [complement, correct+randInt(rng,5,40), Math.max(correct-randInt(rng,5,40),1)], fmt, rng);
  return { id, module:'pctOfQty', difficulty, prompt, options, correctIndex,
    formula: `Part = Total × (Percent ÷ 100)`,
    explain: `${totalDisplay} × (${pct} ÷ 100) = ${fmt(correct)}.` };
}

function genReversePct(id, difficulty, rng){
  const kinds = [
    {total:'Kubernetes cluster', totalNoun:'worker nodes', part:'GPU-enabled nodes'},
    {total:'DevOps team', totalNoun:'microservices', part:'degraded microservices'},
    {total:'engineering department', totalNoun:'employees', part:'Platform Engineers'},
    {total:'cloud operations team', totalNoun:'virtual machines', part:'VMs running Windows'},
    {total:'company', totalNoun:'engineers', part:'DevOps engineers'}
  ];
  const kind = choice(rng, kinds);
  let total, part, correct;
  if(difficulty === 'easy'){
    total = choice(rng, [40,60,80,100,120,150,200]) * choice(rng, [1,2]);
    const pct = choice(rng, [10,20,25,50]);
    part = total * pct / 100;
    correct = pct;
  }else{
    const ranges = { medium:[80,400], hard:[150,900] }[difficulty];
    total = randInt(rng, ranges[0], ranges[1]);
    part = randInt(rng, Math.round(total*0.05), Math.round(total*0.6));
    const raw = (part/total)*100;
    correct = difficulty === 'hard' ? round1(raw) : Math.round(raw);
  }
  const mistakeBase = round1((part/(total-part))*100);
  const fmt = v => (Number.isInteger(v) ? v : v.toFixed(1)) + '%';
  const prompt = `A ${kind.total} has ${total} ${kind.totalNoun}. ${part} are ${kind.part}. What percentage of the ${kind.totalNoun} are ${kind.part}?`;
  const { options, correctIndex } = buildOptions(correct, [mistakeBase, correct+randInt(rng,3,8), Math.max(correct-randInt(rng,3,8),1)], fmt, rng);
  return { id, module:'reversePct', difficulty, prompt, options, correctIndex,
    formula: `Percent = (Part ÷ Total) × 100`,
    explain: `(${part} ÷ ${total}) × 100 = ${fmt(correct)}.` };
}

function genRatioSimplify(id, difficulty, rng){
  const kRange = { easy:[2,6], medium:[3,9], hard:[4,14] }[difficulty];
  const k = randInt(rng, kRange[0], kRange[1]);
  let m, n;
  do { m = randInt(rng,1,9); n = randInt(rng,1,9); } while(m === n || gcd(m,n) !== 1);
  const a = k*m, b = k*n;
  const g = gcd(a,b);
  const correct = `${a/g}:${b/g}`;
  const reversed = `${b/g}:${a/g}`;
  const unsimplified = `${a}:${b}`;
  const third = (g % 2 === 0 && g/2 > 1) ? `${a/(g/2)}:${b/(g/2)}` : `${(a/g)+1}:${b/g}`;
  let distractStrs = [reversed, unsimplified, third].filter((v,i,arr) => v !== correct && arr.indexOf(v) === i);
  let pad = 1;
  while(distractStrs.length < 3){ distractStrs.push(`${a/g+pad}:${b/g}`); pad++; }
  const kinds = [
    {l1:'Linux servers', l2:'Windows servers'},
    {l1:'worker nodes', l2:'control-plane nodes'},
    {l1:'Backend Engineers', l2:'DevOps Engineers'},
    {l1:'Linux VMs', l2:'Windows VMs'}
  ];
  const kind = choice(rng, kinds);
  const prompt = `A team has ${a} ${kind.l1} and ${b} ${kind.l2}. What is the simplified ratio of ${kind.l1} to ${kind.l2}?`;
  const order = shuffle([correct, ...distractStrs.slice(0,3)], rng);
  return { id, module:'ratioSimplify', difficulty, prompt, options: order, correctIndex: order.indexOf(correct),
    formula: `Simplified Ratio = a ÷ GCD(a,b) : b ÷ GCD(a,b)`,
    explain: `GCD(${a}, ${b}) = ${g}, so ${a} ÷ ${g} : ${b} ÷ ${g} = ${correct}.` };
}

function genRatioApply(id, difficulty, rng){
  const threePart = difficulty === 'hard' && rng() < 0.5;
  if(!threePart){
    let p, q;
    do { p = randInt(rng,2,9); q = randInt(rng,2,9); } while(p === q);
    const sum = p+q;
    const multiplier = difficulty === 'easy' ? choice(rng,[4,6,8,10,12]) : randInt(rng,4,20);
    const total = sum*multiplier;
    const askP = rng() < 0.5;
    const correct = (askP?p:q)*multiplier;
    const wrong = (askP?q:p)*multiplier;
    const kind = choice(rng, [
      {a:'Backend', b:'DevOps', noun:'engineers'},
      {a:'Linux', b:'Windows', noun:'servers'}
    ]);
    const askLabel = askP ? kind.a : kind.b;
    const prompt = `${kind.a} : ${kind.b} = ${p} : ${q}. Total ${kind.noun} = ${total}. How many ${askLabel} ${kind.noun} are there?`;
    const fmt = v => Math.round(v).toLocaleString();
    const { options, correctIndex } = buildOptions(correct, [wrong, correct+multiplier, Math.max(correct-multiplier,1)], fmt, rng);
    return { id, module:'ratioApply', difficulty, prompt, options, correctIndex,
      formula: `Part Value = (Total ÷ Sum of Ratio Parts) × Ratio Part`,
      explain: `(${total} ÷ ${sum}) × ${askP?p:q} = ${multiplier} × ${askP?p:q} = ${fmt(correct)}.` };
  }else{
    let parts;
    do { parts = [randInt(rng,1,6),randInt(rng,1,6),randInt(rng,1,6)]; } while(new Set(parts).size < 3);
    const sum = parts.reduce((a,b)=>a+b,0);
    const multiplier = randInt(rng,5,15);
    const total = sum*multiplier;
    const idx = randInt(rng,0,2);
    const correct = parts[idx]*multiplier;
    const labels = ['Frontend','Backend','DevOps'];
    const prompt = `${labels[0]} : ${labels[1]} : ${labels[2]} = ${parts[0]} : ${parts[1]} : ${parts[2]}. Total engineers = ${total}. How many ${labels[idx]} engineers are there?`;
    const others = [0,1,2].filter(i => i !== idx);
    const fmt = v => Math.round(v).toLocaleString();
    const { options, correctIndex } = buildOptions(correct, [parts[others[0]]*multiplier, parts[others[1]]*multiplier, correct+multiplier], fmt, rng);
    return { id, module:'ratioApply', difficulty, prompt, options, correctIndex,
      formula: `Part Value = (Total ÷ Sum of Ratio Parts) × Ratio Part`,
      explain: `(${total} ÷ ${sum}) × ${parts[idx]} = ${multiplier} × ${parts[idx]} = ${fmt(correct)}.` };
  }
}

function genAverages(id, difficulty, rng){
  const n = randInt(rng,4,7);
  const range = { easy:[10,30], medium:[15,60], hard:[100,1200] }[difficulty];
  let vals = [];
  for(let i=0;i<n;i++) vals.push(randInt(rng, range[0], range[1]));
  let sum = vals.reduce((a,b)=>a+b,0);
  if(difficulty !== 'hard'){
    const rem = sum % n;
    if(rem !== 0){ vals[n-1] += (n - rem); sum = vals.reduce((a,b)=>a+b,0); }
  }
  const meanVal = sum / n;
  const correct = difficulty === 'hard' ? round1(meanVal) : meanVal;
  const sorted = [...vals].sort((a,b)=>a-b);
  const median = n % 2 ? sorted[(n-1)/2] : (sorted[n/2-1]+sorted[n/2])/2;
  const kindOptions = ['Tickets resolved','Daily deployments','Incidents resolved','Monthly infrastructure cost (₦\'000)'];
  const kind = choice(rng, kindOptions);
  const prompt = `${kind} over ${n} periods: ${vals.join(', ')}. What is the average?`;
  const fmt = v => Number.isInteger(v) ? v.toString() : v.toFixed(1);
  const { options, correctIndex } = buildOptions(correct, [round1(median), sum, round1(correct + choice(rng,[-4,-3,3,4,5]))], fmt, rng);
  return { id, module:'averages', difficulty, prompt, options, correctIndex,
    formula: `Average = Sum of Values ÷ Number of Values`,
    explain: `${sum} ÷ ${n} = ${fmt(correct)}.` };
}

function renderTableHTML(rows){
  return `<div class="table-scroll"><table class="data-table"><thead><tr><th>Month</th><th>Deployments</th><th>Failed</th><th>Cloud Cost (₦k)</th></tr></thead><tbody>${
    rows.map(r => `<tr><td>${r.month}</td><td>${r.deployments}</td><td>${r.failed}</td><td>${r.cost}</td></tr>`).join('')
  }</tbody></table></div>`;
}

function genTable(id, difficulty, rng){
  const monthsAll = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'];
  const startIdx = randInt(rng, 0, monthsAll.length-4);
  const variant = choice(rng, ['lowestFailRate','lowestCostPerDeploy','overallFailRate','costPerDeployValue']);
  const metricFail = r => r.failed/r.deployments;
  const metricCost = r => (r.cost*1000)/r.deployments;
  const hasTieMin = arr => { const min = Math.min(...arr); return arr.filter(v => Math.abs(v-min) < 1e-9).length > 1; };

  let rows, attempt = 0;
  do{
    rows = [0,1,2,3].map(i => {
      const deployments = randInt(rng, difficulty==='easy'?100:70, difficulty==='easy'?220:280);
      const failRate = randInt(rng,2,14);
      const failed = Math.max(1, Math.round(deployments*failRate/100));
      const cost = randInt(rng,500,1300);
      return { month: monthsAll[startIdx+i], deployments, failed, cost };
    });
    attempt++;
  } while(attempt < 8 && (
    (variant==='lowestFailRate' && hasTieMin(rows.map(metricFail))) ||
    (variant==='lowestCostPerDeploy' && hasTieMin(rows.map(metricCost)))
  ));

  const tableHTML = renderTableHTML(rows);

  if(variant === 'lowestFailRate'){
    const rates = rows.map(r => ({ month:r.month, rate:metricFail(r) }));
    const correctMonth = [...rates].sort((a,b)=>a.rate-b.rate)[0].month;
    const options = shuffle(rows.map(r=>r.month), rng);
    const explain = rates.map(r => `${r.month} ${round1(r.rate*100)}%`).join(', ');
    return { id, module:'table', difficulty, prompt:'Which month had the lowest deployment failure rate?', tableHTML, options, correctIndex: options.indexOf(correctMonth),
      formula: `Failure Rate = Failed ÷ Deployments × 100 (compare each row)`,
      explain: `Failure rates — ${explain}. Lowest: ${correctMonth}.` };
  }
  if(variant === 'lowestCostPerDeploy'){
    const costs = rows.map(r => ({ month:r.month, cpd:metricCost(r) }));
    const correctMonth = [...costs].sort((a,b)=>a.cpd-b.cpd)[0].month;
    const options = shuffle(rows.map(r=>r.month), rng);
    const explain = costs.map(c => `${c.month} ₦${Math.round(c.cpd).toLocaleString()}`).join(', ');
    return { id, module:'table', difficulty, prompt:'Which month had the lowest cloud cost per deployment?', tableHTML, options, correctIndex: options.indexOf(correctMonth),
      formula: `Cost per Deployment = Cost ÷ Deployments (compare each row)`,
      explain: `Cost per deployment — ${explain}. Lowest: ${correctMonth}.` };
  }
  if(variant === 'overallFailRate'){
    const totalDep = rows.reduce((a,r)=>a+r.deployments,0);
    const totalFail = rows.reduce((a,r)=>a+r.failed,0);
    const rawRate = (totalFail/totalDep)*100;
    const correct = difficulty === 'hard' ? round1(rawRate) : Math.round(rawRate);
    const avgOfRates = round1(rows.reduce((a,r)=>a+(r.failed/r.deployments*100),0)/rows.length);
    const fmt = v => (Number.isInteger(v)?v:v.toFixed(1))+'%';
    const { options, correctIndex } = buildOptions(correct, [avgOfRates, correct+randInt(rng,2,5), Math.max(correct-randInt(rng,2,5),0.5)], fmt, rng);
    return { id, module:'table', difficulty, prompt:'Across all four months combined, what was the overall deployment failure rate?', tableHTML, options, correctIndex,
      formula: `Overall Rate = Total Failed ÷ Total Deployments × 100 (weighted, not the average of each row's rate)`,
      explain: `${totalFail} ÷ ${totalDep} × 100 = ${fmt(correct)}.` };
  }
  const idx = randInt(rng,0,3);
  const row = rows[idx];
  const correct = Math.round((row.cost*1000)/row.deployments);
  const swapped = Math.max(1, Math.round(row.deployments/row.cost));
  const fmt = v => '₦'+Math.round(v).toLocaleString();
  const { options, correctIndex } = buildOptions(correct, [swapped, correct+randInt(rng,200,600), Math.max(correct-randInt(rng,200,600),50)], fmt, rng);
  return { id, module:'table', difficulty, prompt:`What was the cloud cost per deployment in ${row.month}?`, tableHTML, options, correctIndex,
    formula: `Cost per Deployment = Cost ÷ Deployments`,
    explain: `₦${(row.cost*1000).toLocaleString()} ÷ ${row.deployments} = ${fmt(correct)}.` };
}

const MODULE_LABELS = {
  pctChange: 'Percentage Change',
  pctOfQty: 'Percentage of Quantity',
  reversePct: 'Reverse Percentage',
  ratioSimplify: 'Ratio Simplification',
  ratioApply: 'Ratio Application',
  averages: 'Averages',
  table: 'Tables & Charts'
};

function buildBank(){
  const rng = mulberry32(20260705);
  const spec = [
    { gen: genPctChange, count: 5 },
    { gen: genPctOfQty, count: 5 },
    { gen: genReversePct, count: 4 },
    { gen: genRatioSimplify, count: 3 },
    { gen: genRatioApply, count: 4 },
    { gen: genAverages, count: 4 },
    { gen: genTable, count: 5 }
  ];
  const diffs = ['easy','medium','hard'];
  let bank = [], id = 0;
  for(const diff of diffs){
    for(const s of spec){
      for(let i=0;i<s.count;i++){
        bank.push(s.gen(id++, diff, rng));
      }
    }
  }
  return bank;
}
const BANK = buildBank(); // 90 questions: 3 difficulties x 7 modules

/* ---------- Persistent state ---------- */
let state = { usedIds: { easy:[], medium:[], hard:[] }, answerLog: [], sessionHistory: [] };

async function loadState(){
  try{
    const res = await window.storage.get('numerical-progress-v1', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state = Object.assign({ usedIds:{easy:[],medium:[],hard:[]}, answerLog:[], sessionHistory:[] }, parsed);
    }
  }catch(e){}
  renderDashboard();
  renderSidebar();
  broadcastToOS();
  const resumable = await checkInProgress();
  if(resumable) renderResumeBanner(resumable);
}

/* ---------- TITAN OS integration ---------- */
function buildOSPayload(){
  const uniqueAttempted = new Set([].concat(state.usedIds.easy, state.usedIds.medium, state.usedIds.hard)).size;
  const totalBank = BANK.length;
  const overallAcc = state.answerLog.length
    ? Math.round(100 * state.answerLog.filter(e=>e.correct).length / state.answerLog.length)
    : null;
  const modules = ['pctChange','pctOfQty','reversePct','ratioSimplify','ratioApply','averages','table'];
  const byModule = {};
  modules.forEach(m => {
    const entries = state.answerLog.filter(e => e.type === m);
    byModule[m] = {
      done: entries.length,
      correct: entries.filter(e=>e.correct).length,
      pct: entries.length ? Math.round(100*entries.filter(e=>e.correct).length/entries.length) : null
    };
  });
  const byDifficulty = {};
  ['easy','medium','hard'].forEach(d => {
    const entries = state.answerLog.filter(e => e.difficulty === d);
    byDifficulty[d] = {
      done: entries.length,
      pct: entries.length ? Math.round(100*entries.filter(e=>e.correct).length/entries.length) : null
    };
  });
  const last = state.sessionHistory.length ? state.sessionHistory[state.sessionHistory.length-1] : null;
  return {
    source: 'vigilnumerical',
    version: 1,
    timestamp: new Date().toISOString(),
    overall: { done: uniqueAttempted, total: totalBank, pct: Math.round(100*uniqueAttempted/totalBank) },
    accuracyPct: overallAcc,
    sessionsCompleted: state.sessionHistory.length,
    byModule,
    byDifficulty,
    lastSession: last ? { difficulty: last.difficulty, score: last.score, total: last.total, accuracy: last.accuracy, ts: last.ts } : null
  };
}
function broadcastToOS(){
  const payload = buildOSPayload();
  try{
    localStorage.setItem('titan_os_vigilnumerical', JSON.stringify(payload));
  }catch(e){
    // localStorage unavailable in this environment — safe to ignore, no impact on the trainer itself
  }
  try{
    if(window.parent !== window){
      window.parent.postMessage(payload, '*');
    }
  }catch(e){}
}

async function saveState(){
  try{
    if(state.answerLog.length > 500) state.answerLog = state.answerLog.slice(-500);
    if(state.sessionHistory.length > 50) state.sessionHistory = state.sessionHistory.slice(-50);
    await window.storage.set('numerical-progress-v1', JSON.stringify(state), false);
  }catch(e){ showToast('Progress could not be saved this time.'); }
}
async function resetProgress(){
  if(!confirm('Reset all saved progress? This cannot be undone.')) return;
  state = { usedIds:{easy:[],medium:[],hard:[]}, answerLog:[], sessionHistory:[] };
  try{ await window.storage.delete('numerical-progress-v1', false); }catch(e){}
  await clearInProgress();
  document.getElementById('resume-banner').innerHTML = '';
  renderDashboard();
  renderSidebar();
  broadcastToOS();
  showToast('Progress reset.');
}

/* ---------- In-progress session persistence ---------- */
async function saveInProgress(){
  try{ await window.storage.set('numerical-inprogress', JSON.stringify(session), false); }catch(e){}
}
async function clearInProgress(){
  try{ await window.storage.delete('numerical-inprogress', false); }catch(e){}
}
async function checkInProgress(){
  try{
    const res = await window.storage.get('numerical-inprogress', false);
    if(res && res.value){
      const saved = JSON.parse(res.value);
      if(saved && Array.isArray(saved.ids) && saved.index < 10) return saved;
    }
  }catch(e){}
  return null;
}
function renderResumeBanner(saved){
  document.getElementById('resume-banner').innerHTML = `
    <div class="panel" style="border-color:var(--gold);">
      <div class="resume-banner-row">
        <div>
          <div style="font-weight:600; margin-bottom:2px;">Unfinished session</div>
          <div style="font-size:12px; color:var(--text-muted);">${saved.difficulty.toUpperCase()} · Question ${saved.index+1} of 10</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn secondary" id="btn-discard-resume">Discard</button>
          <button class="btn" id="btn-resume">Resume</button>
        </div>
      </div>
    </div>`;
  document.getElementById('btn-discard-resume').addEventListener('click', async () => {
    await clearInProgress();
    document.getElementById('resume-banner').innerHTML = '';
  });
  document.getElementById('btn-resume').addEventListener('click', () => {
    session = saved;
    document.getElementById('screen-dashboard').classList.add('hidden');
    document.getElementById('screen-results').classList.add('hidden');
    document.getElementById('screen-session').classList.remove('hidden');
    document.getElementById('sess-diff-label').textContent = saved.difficulty.toUpperCase();
    renderQuestion();
  });
}

/* ---------- Question selection ---------- */
function pickFromTier(tier, count){
  const poolIds = BANK.filter(q => q.difficulty === tier).map(q => q.id);
  let used = state.usedIds[tier] || [];
  let unused = poolIds.filter(id => !used.includes(id));
  let recycled = false;
  if(unused.length < count){ used = []; unused = poolIds.slice(); recycled = true; }
  const picked = shuffle(unused, Math.random).slice(0, count);
  state.usedIds[tier] = used.concat(picked);
  return { picked, recycled };
}
function pickQuestions(difficulty, count){
  if(difficulty === 'mixed'){
    const perTier = Math.ceil(count/3);
    let all = [], recycled = false;
    ['easy','medium','hard'].forEach(tier => {
      const r = pickFromTier(tier, perTier);
      all = all.concat(r.picked);
      if(r.recycled) recycled = true;
    });
    return { picked: shuffle(all, Math.random).slice(0,count), recycled };
  }
  return pickFromTier(difficulty, count);
}

/* ---------- Session runtime ---------- */
let session = null;

function startSession(difficulty){
  const { picked, recycled } = pickQuestions(difficulty, 10);
  session = { difficulty, ids: picked, index: 0, correctCount: 0, answeredCount: 0, times: [], typeTally: {}, qStartTs: null };
  saveState();
  saveInProgress();
  document.getElementById('resume-banner').innerHTML = '';
  document.getElementById('screen-dashboard').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-session').classList.remove('hidden');
  document.getElementById('sess-diff-label').textContent = difficulty.toUpperCase();
  if(recycled) showToast('Bank recycled for this tier — some repeats may appear.');
  renderQuestion();
}

let timerInterval = null;
function renderQuestion(){
  const q = BANK.find(b => b.id === session.ids[session.index]);
  document.getElementById('sess-qnum').textContent = session.index + 1;
  document.getElementById('q-type-tag').textContent = MODULE_LABELS[q.module];
  document.getElementById('q-prompt').textContent = q.prompt;
  document.getElementById('q-table-wrap').innerHTML = q.tableHTML || '';
  document.getElementById('q-feedback').innerHTML = '';
  const optWrap = document.getElementById('q-options');
  optWrap.className = 'opt-grid';
  optWrap.innerHTML = q.options.map((opt,i) => `<button class="opt-btn" data-idx="${i}">${opt}</button>`).join('');
  optWrap.querySelectorAll('.opt-btn').forEach(btn => btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.idx,10))));
  updateGauge();

  session.qStartTs = performance.now();
  if(timerInterval) clearInterval(timerInterval);
  const timerEl = document.getElementById('q-timer');
  timerInterval = setInterval(() => { timerEl.textContent = ((performance.now()-session.qStartTs)/1000).toFixed(1)+'s'; }, 100);
}

function lerpColor(c1, c2, t){
  const p1 = parseInt(c1.slice(1),16), p2 = parseInt(c2.slice(1),16);
  const r1=(p1>>16)&255,g1=(p1>>8)&255,b1=p1&255, r2=(p2>>16)&255,g2=(p2>>8)&255,b2=p2&255;
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}
function updateGauge(){
  const circumference = 201.06;
  const pct = session.answeredCount ? Math.round(100*session.correctCount/session.answeredCount) : null;
  const fill = document.getElementById('gauge-fill');
  const label = document.getElementById('gauge-pct');
  if(pct === null){ fill.setAttribute('stroke-dashoffset', circumference); label.textContent = '—'; fill.setAttribute('stroke', '#4FA8A0'); }
  else{ fill.setAttribute('stroke-dashoffset', circumference*(1-pct/100)); label.textContent = pct+'%'; fill.setAttribute('stroke', lerpColor('#C1554A','#D9A441', Math.min(pct,100)/100)); }
}

function selectAnswer(idx){
  clearInterval(timerInterval);
  const elapsedMs = performance.now() - session.qStartTs;
  const q = BANK.find(b => b.id === session.ids[session.index]);
  const isCorrect = idx === q.correctIndex;

  session.answeredCount++;
  if(isCorrect) session.correctCount++;
  session.times.push(elapsedMs);
  if(!session.typeTally[q.module]) session.typeTally[q.module] = { correct:0, total:0 };
  session.typeTally[q.module].total++;
  if(isCorrect) session.typeTally[q.module].correct++;

  state.answerLog.push({ ts: Date.now(), type: q.module, difficulty: q.difficulty, correct: isCorrect, timeMs: Math.round(elapsedMs) });

  const optWrap = document.getElementById('q-options');
  optWrap.classList.add('answered');
  optWrap.querySelectorAll('.opt-btn').forEach(btn => {
    const i = parseInt(btn.dataset.idx,10);
    btn.style.pointerEvents = 'none';
    if(i === q.correctIndex) btn.classList.add('correct');
    else if(i === idx) btn.classList.add('wrong');
  });
  updateGauge();
  saveInProgress();
  renderSidebar();
  broadcastToOS();

  const fb = document.getElementById('q-feedback');
  fb.innerHTML = `
    <div class="feedback ${isCorrect?'correct':'wrong'}">
      <div class="verdict">${isCorrect?'Correct':'Not quite'}</div>
      <div class="formula">Formula: ${q.formula}</div>
      <div class="explain">${q.explain}</div>
    </div>
    <div class="next-row"><button class="btn" id="btn-next">${session.index < 9 ? 'Next →' : 'See results →'}</button></div>
  `;
  document.getElementById('btn-next').addEventListener('click', nextQuestion);
}

function nextQuestion(){
  session.index++;
  if(session.index >= 10) finishSession();
  else renderQuestion();
}

async function finishSession(){
  clearInterval(timerInterval);
  const avgTimeMs = session.times.reduce((a,b)=>a+b,0)/session.times.length;
  const accuracy = Math.round(100*session.correctCount/10);
  const prevSameDiff = [...state.sessionHistory].reverse().find(s => s.difficulty === session.difficulty);
  const summary = { ts: Date.now(), difficulty: session.difficulty, score: session.correctCount, total: 10, accuracy, avgTimeMs: Math.round(avgTimeMs), typeTally: session.typeTally };
  state.sessionHistory.push(summary);
  await saveState();
  await clearInProgress();
  renderSidebar();
  broadcastToOS();

  document.getElementById('screen-session').classList.add('hidden');
  document.getElementById('screen-results').classList.remove('hidden');
  document.getElementById('res-score').textContent = `${summary.score}/10`;
  document.getElementById('res-accuracy').textContent = `${summary.accuracy}% accuracy`;
  document.getElementById('res-time').textContent = `Avg ${(summary.avgTimeMs/1000).toFixed(1)}s per question`;

  const deltaEl = document.getElementById('res-delta');
  if(prevSameDiff){
    const diff = summary.accuracy - prevSameDiff.accuracy;
    if(diff === 0){ deltaEl.textContent = `Same as your last ${session.difficulty} session`; deltaEl.className = 'delta'; }
    else{ deltaEl.textContent = `${diff>0?'+':''}${diff}% vs your last ${session.difficulty} session`; deltaEl.className = 'delta '+(diff>0?'up':'down'); }
  }else{ deltaEl.textContent = `First ${session.difficulty} session recorded`; deltaEl.className = 'delta'; }

  document.getElementById('res-type-bars').innerHTML = Object.keys(summary.typeTally).map(type => {
    const t = summary.typeTally[type];
    const pct = Math.round(100*t.correct/t.total);
    return typeBarHTML(MODULE_LABELS[type], pct, `${t.correct}/${t.total}`);
  }).join('');
}

function typeBarHTML(label, pct, rightLabel){
  const color = pct >= 80 ? '#4FA8A0' : pct >= 50 ? '#D9A441' : '#C1554A';
  return `<div class="type-row"><div class="type-label">${label}</div><div class="type-bar-track"><div class="type-bar-fill" style="width:${pct}%; background:${color};"></div></div><div class="type-pct">${rightLabel}</div></div>`;
}

function renderSparkline(history){
  if(!history.length) return '<div style="color:var(--text-muted); font-size:12px;">Run a session to start tracking progress.</div>';
  const last = history.slice(-12);
  const w = 220, h = 40, pad = 4;
  const pts = last.map((s,i) => `${(pad+(i/(Math.max(last.length-1,1)))*(w-pad*2)).toFixed(1)},${(h-pad-(s.accuracy/100)*(h-pad*2)).toFixed(1)}`).join(' ');
  const dots = last.map((s,i) => `<circle cx="${(pad+(i/(Math.max(last.length-1,1)))*(w-pad*2)).toFixed(1)}" cy="${(h-pad-(s.accuracy/100)*(h-pad*2)).toFixed(1)}" r="2.4" fill="#D9A441"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="#4FA8A0" stroke-width="2"/>${dots}</svg>`;
}

function renderSidebar(){
  const overall = state.answerLog.length ? Math.round(100*state.answerLog.filter(e=>e.correct).length/state.answerLog.length) : null;
  document.getElementById('ov-accuracy').textContent = overall === null ? '—' : overall+'%';
  document.getElementById('ov-sessions').textContent = state.sessionHistory.length ? `${state.sessionHistory.length} session${state.sessionHistory.length===1?'':'s'} completed` : 'No sessions yet';
  document.getElementById('ov-spark').innerHTML = renderSparkline(state.sessionHistory);

  const modules = ['pctChange','pctOfQty','reversePct','ratioSimplify','ratioApply','averages','table'];
  document.getElementById('type-bars').innerHTML = modules.map(t => {
    const entries = state.answerLog.filter(e => e.type === t);
    const pct = entries.length ? Math.round(100*entries.filter(e=>e.correct).length/entries.length) : 0;
    const rightLabel = entries.length ? `${pct}% (n=${entries.length})` : 'No data';
    return typeBarHTML(MODULE_LABELS[t], entries.length?pct:0, rightLabel);
  }).join('');
}

function renderDashboard(){
  ['easy','medium','hard'].forEach(tier => {
    const total = BANK.filter(q => q.difficulty === tier).length;
    const used = (state.usedIds[tier] || []).length % total;
    document.getElementById('meta-'+tier).textContent = `${total-used} of ${total} fresh`;
  });

  document.getElementById('screen-dashboard').classList.remove('hidden');
  document.getElementById('screen-session').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
}

let toastTimeout = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 3200);
}

document.querySelectorAll('.diff-btn').forEach(btn => btn.addEventListener('click', () => startSession(btn.dataset.diff)));
document.getElementById('btn-reset').addEventListener('click', resetProgress);
document.getElementById('btn-dashboard').addEventListener('click', renderDashboard);
document.getElementById('btn-again').addEventListener('click', () => startSession(session.difficulty));
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('show');
});
document.getElementById('sidebar-backdrop').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('show');
});

loadState();
</script>
</body>
</html>
