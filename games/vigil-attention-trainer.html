<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vigil — Attention & Focus Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1D2129;
    --panel: #262B34;
    --panel-inset: #14171D;
    --border: #383F4C;
    --text: #ECE8DE;
    --text-muted: #8A93A6;
    --gold: #D9A441;
    --teal: #4FA8A0;
    --coral: #C1554A;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image: radial-gradient(circle at 15% 8%, rgba(217,164,65,0.05), transparent 40%),
                       radial-gradient(circle at 85% 90%, rgba(79,168,160,0.06), transparent 45%);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  :focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }
  .app-shell{ display:flex; gap:24px; max-width:1200px; margin:0 auto; padding: 28px 20px 60px; align-items:flex-start; }
  .main-col{ flex:1 1 auto; min-width:0; max-width:680px; margin:0 auto; }
  header.top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 22px; gap:12px; }
  #sidebar-toggle{ display:none; background: var(--panel-inset); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:12px 16px; font-size:13px; font-family:var(--font-body); cursor:pointer; white-space:nowrap; min-height:44px; }
  #sidebar-toggle:hover{ border-color: var(--gold); }
  .sidebar{ width:300px; flex-shrink:0; }
  .sidebar-backdrop{ display:none; }
  .resume-banner-row{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  @media (max-width: 959px){
    #sidebar-toggle{ display:inline-block; }
    .sidebar{
      position: fixed; top:0; right:0; height:100vh; width:min(320px,86vw);
      background: var(--panel); border-left:1px solid var(--border);
      transform: translateX(100%); transition: transform 0.25s ease;
      z-index: 40; padding: 20px; overflow-y:auto; margin:0;
    }
    .sidebar.open{ transform: translateX(0); }
    .sidebar-backdrop{
      display:block; position:fixed; inset:0; background:rgba(0,0,0,0.5);
      opacity:0; pointer-events:none; transition:opacity 0.25s ease; z-index:30;
    }
    .sidebar-backdrop.show{ opacity:1; pointer-events:auto; }
  }
  .brand{ font-family: var(--font-display); font-weight:700; font-size: 22px; letter-spacing: 0.02em; }
  .brand span{ color: var(--gold); }
  .eyebrow{ font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
  .panel{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .panel h2{ font-family: var(--font-display); font-size: 15px; margin: 0 0 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;}

  /* Overview */
  .overview-grid{ display:flex; align-items:center; gap: 22px; }
  .overview-num{ font-family: var(--font-display); font-size: 40px; font-weight:700; line-height:1; }
  .overview-sub{ font-size: 12px; color: var(--text-muted); margin-top:4px; }
  .spark{ flex:1; }
  .spark svg{ width:100%; height: 46px; display:block; }

  .type-row{ display:flex; align-items:center; gap: 10px; font-size: 13px; margin-bottom: 10px; }
  .type-row:last-child{ margin-bottom:0; }
  .type-label{ width: 118px; flex-shrink:0; color: var(--text-muted); }
  .type-bar-track{ flex:1; height:8px; background: var(--panel-inset); border-radius: 4px; overflow:hidden; border:1px solid var(--border); }
  .type-bar-fill{ height:100%; border-radius:4px; background: var(--teal); transition: width 0.5s ease; }
  .type-pct{ width: 70px; text-align:right; color: var(--text-muted); font-family: var(--font-mono); font-size:12px; }

  /* Difficulty picker */
  .diff-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (min-width: 480px){ .diff-grid{ grid-template-columns: repeat(4, 1fr); } }
  .diff-btn{
    background: var(--panel-inset);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    color: var(--text);
    font-family: var(--font-body);
    cursor:pointer;
    text-align:left;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }
  .diff-btn:hover{ border-color: var(--gold); }
  .diff-btn:active{ transform: scale(0.98); }
  .diff-btn .dname{ font-weight:600; font-size:14px; display:block; margin-bottom:4px; }
  .diff-btn .dmeta{ font-size:11px; color: var(--text-muted); font-family: var(--font-mono); }
  .diff-btn.easy .dname{ color: var(--teal); }
  .diff-btn.medium .dname{ color: var(--gold); }
  .diff-btn.hard .dname{ color: var(--coral); }
  .diff-btn.mixed .dname{ color: var(--text); }

  .reset-link{ text-align:center; margin-top: 20px; }
  .reset-link button{
    background:none; border:none; color: var(--text-muted); font-size: 12px;
    text-decoration: underline; cursor:pointer; font-family: var(--font-body);
  }
  .reset-link button:hover{ color: var(--coral); }

  /* Session screen */
  .session-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 16px; }
  .session-meta{ font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); }
  .session-meta b{ color: var(--text); }
  .gauge-wrap{ position:relative; width:76px; height:76px; text-align:center; }
  .gauge-wrap svg{ transform: rotate(-90deg); }
  .gauge-pct{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:15px; font-weight:700; }
  .gauge-timer{ text-align:center; font-family: var(--font-mono); font-size:11px; color: var(--text-muted); margin-top:4px; }

  .instruction{ font-size: 14px; margin-bottom: 14px; line-height:1.5; }
  .instruction .tag{ display:inline-block; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color: var(--bg); background: var(--gold); padding: 2px 7px; border-radius: 4px; margin-right:8px; font-family: var(--font-body); font-weight:600; vertical-align:middle;}
  .stimulus{
    background: var(--panel-inset);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
    font-family: var(--font-mono);
    font-size: 15px;
    letter-spacing: 0.06em;
    line-height: 2;
    word-break: break-word;
    color: var(--text);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.35);
    margin-bottom: 18px;
  }
  .stimulus div{ margin-bottom: 4px; }
  .stimulus div:last-child{ margin-bottom:0; }

  .answer-row{ display:flex; gap: 10px; }
  .answer-row input{
    flex:1;
    background: var(--panel-inset);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 18px;
    padding: 12px 14px;
  }
  .answer-row input:focus{ border-color: var(--gold); }
  .btn{
    background: var(--gold);
    color: #201a0e;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    font-size: 14px;
  }
  .btn:hover{ filter: brightness(1.08); }
  .btn:active{ transform: scale(0.98); }
  .btn.secondary{ background: var(--panel-inset); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled{ opacity: 0.4; cursor:not-allowed; }

  .feedback{ margin-top: 16px; padding: 14px 16px; border-radius: 10px; font-size: 14px; line-height:1.5; }
  .feedback.correct{ background: rgba(79,168,160,0.12); border: 1px solid var(--teal); }
  .feedback.wrong{ background: rgba(193,85,74,0.12); border: 1px solid var(--coral); }
  .feedback .verdict{ font-weight:700; margin-bottom:4px; }
  .feedback.correct .verdict{ color: var(--teal); }
  .feedback.wrong .verdict{ color: var(--coral); }
  .feedback .explain{ color: var(--text-muted); font-size: 13px; }
  .next-row{ margin-top:14px; display:flex; justify-content:flex-end; }

  /* Results */
  .score-hero{ text-align:center; padding: 10px 0 18px; }
  .score-hero .big{ font-family: var(--font-display); font-size: 52px; font-weight:700; line-height:1; }
  .score-hero .sub{ color: var(--text-muted); font-size: 13px; margin-top: 6px; }
  .delta{ font-family: var(--font-mono); font-size:12px; margin-top:6px; }
  .delta.up{ color: var(--teal); }
  .delta.down{ color: var(--coral); }
  .results-actions{ display:flex; gap:10px; margin-top: 6px; }
  .results-actions .btn{ flex:1; }

  .toast{
    position: fixed; left:50%; bottom: 24px; transform: translateX(-50%) translateY(10px);
    background: var(--panel); border:1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity:0;
    transition: opacity 0.25s ease, transform 0.25s ease; pointer-events:none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    max-width: 90%; text-align:center;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  .hidden{ display:none !important; }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="app-shell">
<div class="main-col">
  <header class="top">
    <div>
      <div class="brand">VIGIL<span>.</span></div>
      <div class="eyebrow">Attention & Focus Trainer</div>
    </div>
    <button id="sidebar-toggle">📊 Stats</button>
  </header>

  <!-- DASHBOARD -->
  <div id="screen-dashboard">
    <div id="resume-banner"></div>

    <div class="panel">
      <h2>Start a session · 10 questions</h2>
      <div class="diff-grid">
        <button class="diff-btn easy" data-diff="easy">
          <span class="dname">Easy</span>

        </button>
        <button class="diff-btn medium" data-diff="medium">

        </button>
        <button class="diff-btn hard" data-diff="hard">
          <span class="dname">Hard</span>
          <span class="dmeta" id="meta-hard">30 in pool</span>
        </button>
        <button class="diff-btn mixed" data-diff="mixed">

    <div class="reset-link">

    </div>
  </div>

  <!-- SESSION -->
  <div id="screen-session" class="hidden">
    <div class="session-top">
      <div class="session-meta">
        <div id="sess-diff-label" style="text-transform:uppercase; letter-spacing:0.08em; font-size:12px; color:var(--text-muted);">EASY</div>
        <div>Question <b id="sess-qnum">1</b> / 10</div>
      </div>
      <div>
        <div class="gauge-wrap">
          <svg width="76" height="76" viewBox="0 0 76 76">
            <circle cx="38" cy="38" r="32" fill="none" stroke="#14171D" stroke-width="7"/>
            <circle id="gauge-fill" cx="38" cy="38" r="32" fill="none" stroke="#4FA8A0" stroke-width="7"
              stroke-linecap="round" stroke-dasharray="201.06" stroke-dashoffset="201.06"/>
          </svg>
          <div class="gauge-pct" id="gauge-pct">—</div>
        </div>
        <div class="gauge-timer" id="q-timer">0.0s</div>
      </div>
    </div>

    <div class="panel">
      <div class="instruction"><span class="tag" id="q-type-tag">TYPE</span><span id="q-instruction"></span></div>
      <div class="stimulus" id="q-stimulus"></div>
      <div class="answer-row">
        <input type="number" inputmode="numeric" id="q-answer" placeholder="Your answer" autocomplete="off">
        <button class="btn" id="btn-submit">Submit</button>
      </div>
      <div id="q-feedback"></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="hidden">
    <div class="panel">
      <div class="score-hero">
        <div class="big" id="res-score">0/10</div>
        <div class="sub" id="res-accuracy">0% accuracy</div>
        <div class="sub" id="res-time">Avg 0.0s per question</div>
        <div class="delta" id="res-delta"></div>
      </div>
    </div>
    <div class="panel">
      <h2>This session, by task type</h2>
      <div id="res-type-bars"></div>
    </div>
    <div class="results-actions">
      <button class="btn secondary" id="btn-dashboard">Choose difficulty</button>
      <button class="btn" id="btn-again">Run again</button>
    </div>
  </div>
</div>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>
<aside class="sidebar" id="sidebar">
  <div class="panel">
    <h2>Overview</h2>
    <div class="overview-grid">
      <div>
        <div class="overview-num" id="ov-accuracy">—</div>
        <div class="overview-sub" id="ov-sessions">No sessions yet</div>
      </div>
      <div class="spark" id="ov-spark"></div>
    </div>
  </div>
  <div class="panel">
    <h2>Strength by task type</h2>
    <div id="type-bars"></div>
  </div>
</aside>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- Seeded RNG (stable bank across reloads) ---------- */
function mulberry32(seed){
  let a = seed;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function randInt(rng, min, max){ return Math.floor(rng() * (max - min + 1)) + min; }
function choice(rng, arr){ return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rngFn){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rngFn() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------- Question generators ---------- */
function genCancellation(id, difficulty, rng){
  const lens = {easy:18, medium:30, hard:46};
  const len = lens[difficulty];
  const targets = ['e','r','s','t','n','o'];
  const target = choice(rng, targets);
  const fillers = 'abcdefghijklmnopqrstuvwxyz'.split('').filter(c => c !== target);
  let letters = [], count = 0;
  const p = 0.22;
  for(let i = 0; i < len; i++){
    if(rng() < p){ letters.push(target); count++; }
    else letters.push(choice(rng, fillers));
  }
  return {
    id, type:'cancellation', difficulty,
    tag: 'Cancellation',
    instruction: `Count every "${target}" in the line below.`,
    stimulusLines: [letters.join(' ')],
    answer: count,
    explain: `Target letter "${target}" appears ${count} time${count===1?'':'s'}.`
  };
}

function genMatching(id, difficulty, rng){
  const pairsCount = {easy:4, medium:5, hard:6}[difficulty];
  const strLen = {easy:6, medium:8, hard:10}[difficulty];
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'.split('');
  let lines = [], diffCount = 0;
  for(let i = 0; i < pairsCount; i++){
    let a = [];
    for(let j = 0; j < strLen; j++) a.push(choice(rng, chars));
    let b = a.slice();
    const isDiff = rng() < 0.5;
    if(isDiff){
      const pos = randInt(rng, 0, strLen - 1);
      let newChar;
      do { newChar = choice(rng, chars); } while(newChar === b[pos]);
      b[pos] = newChar;
      diffCount++;
    }
    lines.push(`${i+1}.  ${a.join('')}   vs   ${b.join('')}`);
  }
  return {
    id, type:'matching', difficulty,
    tag: 'Symbol Matching',
    instruction: `How many of the ${pairsCount} pairs below are DIFFERENT?`,
    stimulusLines: lines,
    answer: diffCount,
    explain: `${diffCount} of ${pairsCount} pairs differ.`
  };
}

function genD2(id, difficulty, rng){
  const len = {easy:12, medium:18, hard:24}[difficulty];
  const targetLetter = choice(rng, ['d','p']);
  const otherLetter = targetLetter === 'd' ? 'p' : 'd';
  const distractLetters = ['b','q'];
  const targetMarks = 2;
  let tokens = [], count = 0;
  for(let i = 0; i < len; i++){
    const letter = rng() < 0.55 ? choice(rng, [targetLetter, otherLetter]) : choice(rng, distractLetters);
    const marks = randInt(rng, 1, 3);
    if(letter === targetLetter && marks === targetMarks) count++;
    tokens.push(letter + '˙'.repeat(marks));
  }
  return {
    id, type:'d2', difficulty,
    tag: 'Selective Marking',
    instruction: `Count only "${targetLetter}" with exactly ${targetMarks} marks. Ignore every other letter and mark count.`,
    stimulusLines: [tokens.join('   ')],
    answer: count,
    explain: `"${targetLetter}" with exactly ${targetMarks} marks appears ${count} time${count===1?'':'s'}.`
  };
}

function genProofread(id, difficulty, rng){
  const lenSeq = {easy:6, medium:7, hard:8}[difficulty];
  const step = randInt(rng, 3, 9);
  const start = randInt(rng, 1, 9);
  let seq = [start];
  for(let i = 1; i < lenSeq; i++) seq.push(seq[i-1] + step);
  const errPos = randInt(rng, 1, lenSeq - 2);
  const correctVal = seq[errPos];
  let delta;
  do { delta = randInt(rng, -4, 4); } while(delta === 0);
  seq[errPos] = correctVal + delta;
  return {
    id, type:'proofread', difficulty,
    tag: 'Proofreading',
    instruction: `This sequence should increase by ${step} each step, starting at ${start}. One number is wrong — what should it be?`,
    stimulusLines: [seq.join(', ')],
    answer: correctVal,
    explain: `Step size is ${step}; the value at position ${errPos+1} should be ${correctVal}.`
  };
}

function genTracking(id, difficulty, rng){
  const len = {easy:10, medium:14, hard:18}[difficulty];
  const divisor = choice(rng, [3,4]);
  let nums = [], count = 0;
  for(let i = 0; i < len; i++){
    const n = randInt(rng, 1, 40);
    if(n % divisor === 0) count++;
    nums.push(n);
  }
  return {
    id, type:'tracking', difficulty,
    tag: 'Sustained Tracking',
    instruction: `Count how many numbers below are multiples of ${divisor}.`,
    stimulusLines: [nums.join(', ')],
    answer: count,
    explain: `${count} multiples of ${divisor} appear in the sequence.`
  };
}

const TYPE_LABELS = {
  cancellation: 'Cancellation',
  matching: 'Matching',
  d2: 'Selective Marking',
  proofread: 'Proofreading',
  tracking: 'Tracking'
};

function buildBank(){
  const rng = mulberry32(20260705);
  const generators = [genCancellation, genMatching, genD2, genProofread, genTracking];
  const diffs = ['easy','medium','hard'];
  let bank = [], id = 0;
  for(const diff of diffs){
    for(const gen of generators){
      for(let i = 0; i < 6; i++){
        bank.push(gen(id++, diff, rng));
      }
    }
  }
  return bank;
}
const BANK = buildBank(); // 90 questions: 3 difficulties x 5 types x 6

/* ---------- Persistent state ---------- */
let state = {
  usedIds: { easy: [], medium: [], hard: [] },
  answerLog: [],
  sessionHistory: []
};

async function loadState(){
  try{
    const res = await window.storage.get('progress-v1', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state = Object.assign({ usedIds:{easy:[],medium:[],hard:[]}, answerLog:[], sessionHistory:[] }, parsed);
    }
  }catch(e){
    // no saved progress yet — start fresh
  }
  renderDashboard();
  renderSidebar();
  broadcastToOS();
  const resumable = await checkInProgress();
  if(resumable) renderResumeBanner(resumable);
}

/* ---------- TITAN OS integration ---------- */
function buildOSPayload(){
  const uniqueAttempted = new Set([].concat(state.usedIds.easy, state.usedIds.medium, state.usedIds.hard)).size;
  const totalBank = BANK.length;
  const overallAcc = state.answerLog.length
    ? Math.round(100 * state.answerLog.filter(e=>e.correct).length / state.answerLog.length)
    : null;
  const types = ['cancellation','matching','d2','proofread','tracking'];
  const byType = {};
  types.forEach(t => {
    const entries = state.answerLog.filter(e => e.type === t);
    byType[t] = {
      done: entries.length,
      correct: entries.filter(e=>e.correct).length,
      pct: entries.length ? Math.round(100*entries.filter(e=>e.correct).length/entries.length) : null
    };
  });
  const byDifficulty = {};
  ['easy','medium','hard'].forEach(d => {
    const entries = state.answerLog.filter(e => e.difficulty === d);
    byDifficulty[d] = {
      done: entries.length,
      pct: entries.length ? Math.round(100*entries.filter(e=>e.correct).length/entries.length) : null
    };
  });
  const last = state.sessionHistory.length ? state.sessionHistory[state.sessionHistory.length-1] : null;
  return {
    source: 'vigilattention',
    version: 1,
    timestamp: new Date().toISOString(),
    overall: { done: uniqueAttempted, total: totalBank, pct: Math.round(100*uniqueAttempted/totalBank) },
    accuracyPct: overallAcc,
    sessionsCompleted: state.sessionHistory.length,
    byType,
    byDifficulty,
    lastSession: last ? { difficulty: last.difficulty, score: last.score, total: last.total, accuracy: last.accuracy, ts: last.ts } : null
  };
}
function broadcastToOS(){
  const payload = buildOSPayload();
  try{
    localStorage.setItem('titan_os_vigilattention', JSON.stringify(payload));
  }catch(e){
    // localStorage unavailable in this environment — safe to ignore, no impact on the trainer itself
  }
  try{
    if(window.parent !== window){
      window.parent.postMessage(payload, '*');
    }
  }catch(e){}
}

async function saveState(){
  try{
    if(state.answerLog.length > 500) state.answerLog = state.answerLog.slice(-500);
    if(state.sessionHistory.length > 50) state.sessionHistory = state.sessionHistory.slice(-50);
    await window.storage.set('progress-v1', JSON.stringify(state), false);
  }catch(e){
    showToast('Progress could not be saved this time.');
  }
}

async function resetProgress(){
  if(!confirm('Reset all saved progress? This cannot be undone.')) return;
  state = { usedIds: { easy: [], medium: [], hard: [] }, answerLog: [], sessionHistory: [] };
  try{ await window.storage.delete('progress-v1', false); }catch(e){}
  await clearInProgress();
  document.getElementById('resume-banner').innerHTML = '';
  renderDashboard();
  renderSidebar();
  broadcastToOS();
  showToast('Progress reset.');
}

/* ---------- In-progress session persistence ---------- */
async function saveInProgress(){
  try{ await window.storage.set('attention-inprogress', JSON.stringify(session), false); }catch(e){}
}
async function clearInProgress(){
  try{ await window.storage.delete('attention-inprogress', false); }catch(e){}
}
async function checkInProgress(){
  try{
    const res = await window.storage.get('attention-inprogress', false);
    if(res && res.value){
      const saved = JSON.parse(res.value);
      if(saved && Array.isArray(saved.ids) && saved.index < 10) return saved;
    }
  }catch(e){}
  return null;
}
function renderResumeBanner(saved){
  document.getElementById('resume-banner').innerHTML = `
    <div class="panel" style="border-color:var(--gold);">
      <div class="resume-banner-row">
        <div>
          <div style="font-weight:600; margin-bottom:2px;">Unfinished session</div>
          <div style="font-size:12px; color:var(--text-muted);">${saved.difficulty.toUpperCase()} · Question ${saved.index+1} of 10</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn secondary" id="btn-discard-resume">Discard</button>
          <button class="btn" id="btn-resume">Resume</button>
        </div>
      </div>
    </div>`;
  document.getElementById('btn-discard-resume').addEventListener('click', async () => {
    await clearInProgress();
    document.getElementById('resume-banner').innerHTML = '';
  });
  document.getElementById('btn-resume').addEventListener('click', () => {
    session = saved;
    document.getElementById('screen-dashboard').classList.add('hidden');
    document.getElementById('screen-results').classList.add('hidden');
    document.getElementById('screen-session').classList.remove('hidden');
    document.getElementById('sess-diff-label').textContent = saved.difficulty.toUpperCase();
    renderQuestion();
  });
}

/* ---------- Question selection ---------- */
function pickFromTier(tier, count){
  const poolIds = BANK.filter(q => q.difficulty === tier).map(q => q.id);
  let used = state.usedIds[tier] || [];
  let unused = poolIds.filter(id => !used.includes(id));
  let recycled = false;
  if(unused.length < count){
    used = [];
    unused = poolIds.slice();
    recycled = true;
  }
  const picked = shuffle(unused, Math.random).slice(0, count);
  state.usedIds[tier] = used.concat(picked);
  return { picked, recycled };
}

function pickQuestions(difficulty, count){
  if(difficulty === 'mixed'){
    const perTier = Math.ceil(count / 3);
    let all = [], recycled = false;
    ['easy','medium','hard'].forEach(tier => {
      const r = pickFromTier(tier, perTier);
      all = all.concat(r.picked);
      if(r.recycled) recycled = true;
    });
    return { picked: shuffle(all, Math.random).slice(0, count), recycled };
  }
  return pickFromTier(difficulty, count);
}

/* ---------- Session runtime ---------- */
let session = null;

function startSession(difficulty){
  const { picked, recycled } = pickQuestions(difficulty, 10);
  session = {
    difficulty,
    ids: picked,
    index: 0,
    correctCount: 0,
    answeredCount: 0,
    times: [],
    typeTally: {},
    qStartTs: null
  };
  saveState(); // persist used-id tracking immediately
  saveInProgress();
  document.getElementById('resume-banner').innerHTML = '';
  document.getElementById('screen-dashboard').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('screen-session').classList.remove('hidden');
  document.getElementById('sess-diff-label').textContent = difficulty.toUpperCase();
  if(recycled) showToast('Bank recycled for this tier — some repeats may appear.');
  renderQuestion();
}

let timerInterval = null;
function renderQuestion(){
  const q = BANK.find(b => b.id === session.ids[session.index]);
  document.getElementById('sess-qnum').textContent = session.index + 1;
  document.getElementById('q-type-tag').textContent = q.tag;
  document.getElementById('q-instruction').textContent = q.instruction;
  document.getElementById('q-stimulus').innerHTML = q.stimulusLines.map(l => `<div>${l}</div>`).join('');
  document.getElementById('q-answer').value = '';
  document.getElementById('q-answer').disabled = false;
  document.getElementById('btn-submit').disabled = false;
  document.getElementById('q-feedback').innerHTML = '';
  updateGauge();

  session.qStartTs = performance.now();
  if(timerInterval) clearInterval(timerInterval);
  const timerEl = document.getElementById('q-timer');
  timerInterval = setInterval(() => {
    const elapsed = (performance.now() - session.qStartTs) / 1000;
    timerEl.textContent = elapsed.toFixed(1) + 's';
  }, 100);

  setTimeout(() => document.getElementById('q-answer').focus(), 50);
}

function lerpColor(c1, c2, t){
  const p1 = parseInt(c1.slice(1),16), p2 = parseInt(c2.slice(1),16);
  const r1=(p1>>16)&255,g1=(p1>>8)&255,b1=p1&255;
  const r2=(p2>>16)&255,g2=(p2>>8)&255,b2=p2&255;
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), b=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function updateGauge(){
  const circumference = 201.06;
  const pct = session.answeredCount ? Math.round(100 * session.correctCount / session.answeredCount) : null;
  const fill = document.getElementById('gauge-fill');
  const label = document.getElementById('gauge-pct');
  if(pct === null){
    fill.setAttribute('stroke-dashoffset', circumference);
    label.textContent = '—';
    fill.setAttribute('stroke', '#4FA8A0');
  }else{
    const offset = circumference * (1 - pct/100);
    fill.setAttribute('stroke-dashoffset', offset);
    label.textContent = pct + '%';
    fill.setAttribute('stroke', lerpColor('#C1554A', '#D9A441', Math.min(pct,100)/100));
  }
}

function submitAnswer(){
  const input = document.getElementById('q-answer');
  if(input.value === '') { input.focus(); return; }
  clearInterval(timerInterval);
  const elapsedMs = performance.now() - session.qStartTs;
  const userVal = parseInt(input.value, 10);
  const q = BANK.find(b => b.id === session.ids[session.index]);
  const isCorrect = userVal === q.answer;

  session.answeredCount++;
  if(isCorrect) session.correctCount++;
  session.times.push(elapsedMs);
  if(!session.typeTally[q.type]) session.typeTally[q.type] = { correct:0, total:0 };
  session.typeTally[q.type].total++;
  if(isCorrect) session.typeTally[q.type].correct++;

  state.answerLog.push({
    ts: Date.now(), type: q.type, difficulty: q.difficulty,
    correct: isCorrect, timeMs: Math.round(elapsedMs)
  });

  input.disabled = true;
  document.getElementById('btn-submit').disabled = true;
  updateGauge();
  saveInProgress();
  renderSidebar();
  broadcastToOS();

  const fb = document.getElementById('q-feedback');
  fb.innerHTML = `
    <div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
      <div class="verdict">${isCorrect ? 'Correct' : 'Not quite — answer: ' + q.answer}</div>
      <div class="explain">${q.explain}</div>
    </div>
    <div class="next-row"><button class="btn" id="btn-next">${session.index < 9 ? 'Next →' : 'See results →'}</button></div>
  `;
  document.getElementById('btn-next').addEventListener('click', nextQuestion);
}

function nextQuestion(){
  session.index++;
  if(session.index >= 10){
    finishSession();
  }else{
    renderQuestion();
  }
}

async function finishSession(){
  clearInterval(timerInterval);
  const avgTimeMs = session.times.reduce((a,b) => a+b, 0) / session.times.length;
  const accuracy = Math.round(100 * session.correctCount / 10);

  const prevSameDiff = [...state.sessionHistory].reverse().find(s => s.difficulty === session.difficulty);

  const summary = {
    ts: Date.now(),
    difficulty: session.difficulty,
    score: session.correctCount,
    total: 10,
    accuracy,
    avgTimeMs: Math.round(avgTimeMs),
    typeTally: session.typeTally
  };
  state.sessionHistory.push(summary);
  await saveState();
  await clearInProgress();
  renderSidebar();
  broadcastToOS();

  document.getElementById('screen-session').classList.add('hidden');
  document.getElementById('screen-results').classList.remove('hidden');
  document.getElementById('res-score').textContent = `${summary.score}/10`;
  document.getElementById('res-accuracy').textContent = `${summary.accuracy}% accuracy`;
  document.getElementById('res-time').textContent = `Avg ${(summary.avgTimeMs/1000).toFixed(1)}s per question`;

  const deltaEl = document.getElementById('res-delta');
  if(prevSameDiff){
    const diff = summary.accuracy - prevSameDiff.accuracy;
    if(diff === 0){
      deltaEl.textContent = `Same as your last ${session.difficulty} session`;
      deltaEl.className = 'delta';
    }else{
      deltaEl.textContent = `${diff > 0 ? '+' : ''}${diff}% vs your last ${session.difficulty} session`;
      deltaEl.className = 'delta ' + (diff > 0 ? 'up' : 'down');
    }
  }else{
    deltaEl.textContent = `First ${session.difficulty} session recorded`;
    deltaEl.className = 'delta';
  }

  const barsEl = document.getElementById('res-type-bars');
  barsEl.innerHTML = Object.keys(summary.typeTally).map(type => {
    const t = summary.typeTally[type];
    const pct = Math.round(100 * t.correct / t.total);
    return typeBarHTML(TYPE_LABELS[type], pct, `${t.correct}/${t.total}`);
  }).join('');
}

function typeBarHTML(label, pct, rightLabel){
  const color = pct >= 80 ? '#4FA8A0' : pct >= 50 ? '#D9A441' : '#C1554A';
  return `
    <div class="type-row">
      <div class="type-label">${label}</div>
      <div class="type-bar-track"><div class="type-bar-fill" style="width:${pct}%; background:${color};"></div></div>
      <div class="type-pct">${rightLabel}</div>
    </div>`;
}

/* ---------- Dashboard rendering ---------- */
function renderSparkline(history){
  if(!history.length) return '<div style="color:var(--text-muted); font-size:12px;">Run a session to start tracking progress.</div>';
  const last = history.slice(-12);
  const w = 220, h = 40, pad = 4;
  const pts = last.map((s,i) => {
    const x = pad + (i/(Math.max(last.length-1,1))) * (w - pad*2);
    const y = h - pad - (s.accuracy/100) * (h - pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const dots = last.map((s,i) => {
    const x = pad + (i/(Math.max(last.length-1,1))) * (w - pad*2);
    const y = h - pad - (s.accuracy/100) * (h - pad*2);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.4" fill="#D9A441"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="#4FA8A0" stroke-width="2"/>
    ${dots}
  </svg>`;
}

function renderSidebar(){
  const overall = state.answerLog.length
    ? Math.round(100 * state.answerLog.filter(e => e.correct).length / state.answerLog.length)
    : null;
  document.getElementById('ov-accuracy').textContent = overall === null ? '—' : overall + '%';
  document.getElementById('ov-sessions').textContent = state.sessionHistory.length
    ? `${state.sessionHistory.length} session${state.sessionHistory.length===1?'':'s'} completed`
    : 'No sessions yet';
  document.getElementById('ov-spark').innerHTML = renderSparkline(state.sessionHistory);

  const types = ['cancellation','matching','d2','proofread','tracking'];
  document.getElementById('type-bars').innerHTML = types.map(t => {
    const entries = state.answerLog.filter(e => e.type === t);
    const pct = entries.length ? Math.round(100 * entries.filter(e=>e.correct).length / entries.length) : 0;
    const rightLabel = entries.length ? `${pct}% (n=${entries.length})` : 'No data';
    return typeBarHTML(TYPE_LABELS[t], entries.length ? pct : 0, rightLabel);
  }).join('');
}

function renderDashboard(){
  ['easy','medium','hard'].forEach(tier => {
    const total = BANK.filter(q => q.difficulty === tier).length;
    const used = (state.usedIds[tier] || []).length % total;
    const remaining = total - used;
    document.getElementById('meta-' + tier).textContent = `${remaining} of ${total} fresh`;
  });

  document.getElementById('screen-dashboard').classList.remove('hidden');
  document.getElementById('screen-session').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
}

/* ---------- Toast ---------- */
let toastTimeout = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ---------- Wiring ---------- */
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => startSession(btn.dataset.diff));
});
document.getElementById('btn-submit').addEventListener('click', submitAnswer);
document.getElementById('q-answer').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') submitAnswer();
});
document.getElementById('btn-reset').addEventListener('click', resetProgress);
document.getElementById('btn-dashboard').addEventListener('click', renderDashboard);
document.getElementById('btn-again').addEventListener('click', () => startSession(session.difficulty));
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('show');
});
document.getElementById('sidebar-backdrop').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('show');
});

loadState();
</script>
