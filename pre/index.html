<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PRE-TITAN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090f;--bg2:#0d1017;--bg3:#131720;--bg4:#191e28;--bg5:#1f2535;--bg6:#262d3d;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#dde1ed;--text2:#7d849a;--text3:#454d63;
  --accent:#5b8dee;--adim:rgba(91,141,238,0.09);--ab:rgba(91,141,238,0.28);
  --green:#2ec887;--gdim:rgba(46,200,135,0.09);--gb:rgba(46,200,135,0.28);
  --amber:#e8a020;--ambdim:rgba(232,160,32,0.09);--ambb:rgba(232,160,32,0.28);
  --red:#e05252;--rdim:rgba(224,82,82,0.09);--rb:rgba(224,82,82,0.28);
  --purple:#9b7fe8;--pdim:rgba(155,127,232,0.09);--pb:rgba(155,127,232,0.28);
  --pink:#d46fa0;
  --r:6px;--rl:10px;--sw:248px;--sw-rail:52px;--hh:52px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--font);color:var(--text);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}

/* PAGE TRANSITION */
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes barGrow{from{width:0!important}to{}}
.page-enter{animation:pageIn .22s var(--ease) forwards}
.fade-in{animation:fadeIn .18s var(--ease) forwards}
.slide-in{animation:slideIn .18s var(--ease) forwards}

#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sb{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s var(--ease)}
#sb.rail{width:var(--sw-rail)}
.sb-logo{height:var(--hh);display:flex;align-items:center;gap:11px;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;position:relative}
.sb-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:5px;border:1px solid var(--border2);background:var(--bg4);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;transition:all .15s;flex-shrink:0}
.sb-toggle:hover{background:var(--bg5);color:var(--text)}
#sb.rail .sb-toggle{right:50%;transform:translate(50%,-50%)}
#sb.rail .lt,#sb.rail .ls{display:none}
#sb.rail .lm{margin:0 auto}
#sb.rail .sb-logo{justify-content:center;padding:0}
#sb.rail .nsec{display:none}
#sb.rail .ni-lbl,#sb.rail .nbadge{display:none}
#sb.rail .ni{justify-content:center;padding:8px 0;margin:1px 6px;width:calc(100% - 12px)}
#sb.rail .ni-ico{width:auto;font-size:13px}
#sb.rail .sb-foot{padding:8px 6px}
#sb.rail .mini-prog{padding:8px 6px}
#sb.rail .mp-top span:first-child{display:none}
#sb.rail .mp-top{justify-content:center}
.lm{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:var(--mono);letter-spacing:.05em;flex-shrink:0}
.lt{font-size:13px;font-weight:600;letter-spacing:.02em;color:var(--text)}
.ls{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-nav::-webkit-scrollbar{width:2px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--bg6);border-radius:2px}
.nsec{padding:16px 14px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text3)}
.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);margin:1px 6px;cursor:pointer;transition:background .12s,color .12s;color:var(--text2);font-size:12px;font-weight:400;border:1px solid transparent;width:calc(100% - 12px);text-align:left}
.ni:hover{background:var(--bg4);color:var(--text)}
.ni.active{background:var(--adim);color:var(--accent);border-color:var(--ab);font-weight:500}
.ni-ico{font-size:11px;width:16px;text-align:center;flex-shrink:0;font-family:var(--mono);font-weight:500;color:var(--text3)}
.ni.active .ni-ico{color:var(--accent)}
.ni-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nbadge{font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px;background:var(--bg5);color:var(--text3);font-family:var(--mono);flex-shrink:0}
.nbadge.done{background:var(--gdim);color:var(--green)}
.nbadge.partial{background:var(--ambdim);color:var(--amber)}
.sb-foot{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.mini-prog{background:var(--bg3);border-radius:var(--r);padding:10px 12px;border:1px solid var(--border)}
.mp-top{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px}
.mp-pct{color:var(--accent);font-weight:600;font-family:var(--mono)}
.bw{height:3px;background:var(--bg6);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .45s var(--ease)}

/* HEADER */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#hdr{height:var(--hh);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;background:var(--bg2)}
.ht{font-size:14px;font-weight:500;color:var(--text)}
.hs{font-size:11px;color:var(--text3);margin-top:1px}
.ha{display:flex;align-items:center;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;transition:all .12s}
.btn:hover{background:var(--bg5);color:var(--text);border-color:var(--border3)}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-accent{background:var(--accent);color:#fff;border-color:transparent}
.btn-accent:hover{filter:brightness(1.1);color:#fff}
.btn-green{background:var(--green);color:#07090f;border-color:transparent;font-weight:600}
.btn-green:hover{filter:brightness(1.1);color:#07090f}
.btn-red{background:var(--rdim);color:var(--red);border-color:var(--rb)}
.btn-red:hover{background:var(--red);color:#fff}
#content{flex:1;overflow-y:auto;padding:24px}
#content
/* CONFIDENCE POPUP */
@keyframes confIn{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes confOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-4px) scale(.96)}}
.conf-popup{
  position:fixed;z-index:300;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--rl);padding:14px 16px;width:260px;
  box-shadow:0 16px 48px rgba(0,0,0,.7);
  animation:confIn .18s var(--ease) forwards;
}
.conf-popup.out{animation:confOut .15s var(--ease) forwards}
.conf-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.4}
.conf-sub{font-size:10px;color:var(--text3);margin-bottom:10px}
.conf-levels{display:flex;gap:6px}
.cl-btn{
  flex:1;padding:7px 4px;border-radius:var(--r);border:1px solid var(--border2);
  background:var(--bg4);font-size:10px;font-weight:600;cursor:pointer;
  transition:all .12s;text-align:center;color:var(--text2);
  font-family:var(--mono);letter-spacing:.03em;
}
.cl-btn:hover{border-color:currentColor}
.cl-btn.l1{--c:#e05252}
.cl-btn.l2{--c:#e8a020}
.cl-btn.l3{--c:#5b8dee}
.cl-btn.l4{--c:#2ec887}
.cl-btn:hover,.cl-btn.sel{background:var(--c);border-color:var(--c);color:#fff}

/* GAPS SECTION */
.gap-item{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:6px;transition:border-color .15s;
}
.gap-item:hover{border-color:var(--border2)}
.gap-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.gap-dot.shaky{background:var(--red)}
.gap-dot.partial{background:var(--amber)}
.gap-body{flex:1;min-width:0}
.gap-name{font-size:12px;color:var(--text);margin-bottom:2px}
.gap-track{font-size:10px;color:var(--text3)}
.gap-conf{font-size:10px;font-weight:600;font-family:var(--mono);flex-shrink:0;margin-top:2px}
.conf-shaky{color:var(--red)}
.conf-unsure{color:var(--amber)}
.conf-solid{color:var(--accent)}
.conf-owned{color:var(--green)}

/* DOCTRINE slow fade */
@keyframes doctrineFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.doctrine-enter{animation:doctrineFade .7s var(--ease) forwards}
.doc-map .map-node{animation:doctrineFade .5s var(--ease) both}
@media(max-width:900px){
  :root{--sw:200px}
  .tgrid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
  .rgrid{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .doc-map{width:180px}
}
@media(max-width:680px){
  :root{--sw:var(--sw-rail,52px)}
  #sb{width:var(--sw-rail)}
  #sb .lt,#sb .ls{display:none}
  #sb .lm{margin:0 auto}
  #sb .sb-logo{justify-content:center;padding:0}
  #sb .nsec{display:none}
  #sb .ni-lbl,#sb .nbadge{display:none}
  #sb .ni{justify-content:center;padding:8px 0}
  #sb .sb-foot{padding:8px 6px}
  #sb .mini-prog{padding:8px 6px}
  #sb .mp-top span:first-child{display:none}
  #sb .mp-top{justify-content:center}
  .grid4{grid-template-columns:1fr 1fr}
  .tgrid{grid-template-columns:1fr 1fr}
  .rgrid{grid-template-columns:1fr}
  .agrid{grid-template-columns:1fr}
  .doc-layout{flex-direction:column}
  .doc-map{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:180px;display:flex;flex-wrap:wrap;gap:4px;flex-direction:row;align-items:flex-start}
  .doc-scroll{padding:16px 18px}
  .map-node{width:auto;flex:0 0 auto}
  .map-node-desc{display:none}
  #content{padding:14px}
  .big-prog{padding:14px 16px}
}
::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:var(--bg6);border-radius:2px}

/* LAYOUT COMPONENTS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:20px 22px}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.stat.ca::before{background:var(--accent)}
.stat.cg::before{background:var(--green)}
.stat.cp::before{background:var(--purple)}
.stat.camb::before{background:var(--amber)}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:300;font-family:var(--mono);line-height:1;letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.ca .stat-val{color:var(--accent)}
.cg .stat-val{color:var(--green)}
.cp .stat-val{color:var(--purple)}
.camb .stat-val{color:var(--amber)}

/* BIG PROGRESS */
.big-prog{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:20px 22px;margin-bottom:24px}
.bp-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.bp-lbl{font-size:13px;font-weight:500;color:var(--text)}
.bp-nums{font-size:11px;color:var(--text3);font-family:var(--mono)}
.bb{height:6px;background:var(--bg6);border-radius:3px;overflow:hidden;margin-bottom:8px}
.bbf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--purple),var(--pink));transition:width .5s var(--ease)}
.mss{position:relative;height:14px;margin-top:4px}
.ms{position:absolute;transform:translateX(-50%);text-align:center;font-size:9px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.ms.hit{color:var(--green)}
.ms-tick{width:1px;height:3px;background:var(--border2);margin:0 auto 2px}
.ms-tick.hit{background:var(--green)}

/* TRACK CARDS */
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.tc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.tc:hover{border-color:var(--border3);background:var(--bg4)}
.tc-accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.tc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tc-badge{font-size:10px;font-weight:600;font-family:var(--mono);padding:2px 7px;border-radius:4px;letter-spacing:.02em}
.tc-pct{font-size:20px;font-weight:300;font-family:var(--mono);letter-spacing:-.02em}
.tc-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.tc-meta{font-size:10px;color:var(--text3)}
.tc-bar{height:2px;background:var(--bg6);border-radius:1px;overflow:hidden;margin-top:12px;position:relative}
.tc-bar::before{content:'';position:absolute;inset:0;background:var(--border2)}
.tc-bar-f{height:100%;border-radius:1px;transition:width .5s var(--ease);position:relative;z-index:1;min-width:0}

/* PHASES + LABS */
.pw{margin-bottom:6px}
.ph{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;transition:background .12s}
.ph:hover{background:var(--bg4)}
.ph-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;transition:all .2s}
.ph-dot.partial{border-color:var(--amber);background:var(--ambdim)}
.ph-dot.done{border-color:var(--green);background:var(--green)}
.ph-name{flex:1;font-size:12px;font-weight:500;color:var(--text)}
.ph-cnt{font-size:10px;color:var(--text3);font-family:var(--mono)}
.ph-chv{font-size:9px;color:var(--text3);transition:transform .2s;width:10px;text-align:center}
.ph-chv.open{transform:rotate(90deg)}
.ph-bar{height:2px;background:var(--bg6);margin:0 13px;border-radius:1px;overflow:hidden;display:none}
.ph-bar.vis{display:block}
.ph-barf{height:100%;border-radius:1px;background:var(--amber);transition:width .3s var(--ease)}
.ph-barf.done{background:var(--green)}
.labs{padding:0 13px 0 30px;display:none}
.labs.open{display:block}
.lab{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .1s}
.lab:last-child{border-bottom:none}
.lab:hover{opacity:.85}
.chk{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;background:transparent}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:'✓';font-size:9px;color:#07090f;font-weight:700}
.ln{font-size:12px;color:var(--text2);flex:1;transition:color .12s}
.ln.done{color:var(--text3);text-decoration:line-through}

/* ROLES — resume-grade */
.roles-section{margin-bottom:24px}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.rc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;transition:all .25s;position:relative;overflow:hidden}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .3s}
.rc.unlocked{border-color:var(--gb);background:rgba(46,200,135,.04)}
.rc.unlocked::before{opacity:1;background:var(--green)}
.rc.next{border-color:var(--ab);background:var(--adim)}
.rc.next::before{opacity:1;background:var(--accent)}
.rc.locked{opacity:.35}
.rc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.rc-abbr{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:4px;letter-spacing:.06em;background:var(--bg5);color:var(--text3)}
.rc.unlocked .rc-abbr{background:var(--gdim);color:var(--green)}
.rc.next .rc-abbr{background:var(--adim);color:var(--accent)}
.rc-status{font-size:10px;font-weight:600}
.rc-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.rc.unlocked .rc-name{color:var(--green)}
.rc.next .rc-name{color:var(--accent)}
.rc-desc{font-size:11px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.rc-reqs{display:flex;flex-direction:column;gap:5px}
.req-row{display:flex;flex-direction:column;gap:3px}
.req-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.req-meta.met{color:var(--green)}
.req-meta.active{color:var(--accent)}
.req-bar{height:2px;background:var(--bg6);border-radius:1px;overflow:hidden}
.req-barf{height:100%;border-radius:1px;transition:width .5s var(--ease)}

/* ADMIN */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
@media(max-width:680px){.agrid{grid-template-columns:1fr}}
.ac{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.ac-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.ac-sub{font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.5}
.fl{margin-bottom:10px}
.fl-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.fl-lbl span{color:var(--red)}
.editor-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg4);border-radius:5px;font-size:11px;margin-bottom:4px}
.editor-item .name{flex:1;color:var(--text2)}
.editor-item .meta{font-family:var(--mono);color:var(--text3);font-size:10px}

/* DOCTRINE */
.doc-layout{display:flex;gap:0;height:calc(100vh - var(--hh) - 48px);overflow:hidden}
.doc-map{width:220px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:12px 8px;background:var(--bg2);transition:width .22s var(--ease),padding .22s var(--ease)}
.doc-map::-webkit-scrollbar{width:2px}
.doc-map::-webkit-scrollbar-thumb{background:var(--bg6);border-radius:2px}
.doc-scroll{flex:1;overflow-y:auto;padding:28px 36px;background:var(--bg)}
.doc-scroll
/* CONFIDENCE POPUP */
@keyframes confIn{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes confOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-4px) scale(.96)}}
.conf-popup{
  position:fixed;z-index:300;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--rl);padding:14px 16px;width:260px;
  box-shadow:0 16px 48px rgba(0,0,0,.7);
  animation:confIn .18s var(--ease) forwards;
}
.conf-popup.out{animation:confOut .15s var(--ease) forwards}

function isDone(k){const v=prog[k];return v===true||( v&&typeof v==='object'&&v.done);}
function getConf(k){const v=prog[k];return(v&&typeof v==='object')?v.conf:null;}
function setDone(k,val){
  const cur=prog[k];
  if(val){prog[k]={done:true,conf:(cur&&typeof cur==='object')?cur.conf:null};}
  else{delete prog[k];}
}
function setConf(k,c){
  const cur=prog[k];
  if(cur&&typeof cur==='object'){prog[k]={done:cur.done,conf:c};}
  else if(isDone(k)){prog[k]={done:true,conf:c};}
}

let TRACKS=[], ROLES=[], prog={}, openPh={}, view='dash', _prevUnlocked=0;

function load(){
  try{
    const raw=localStorage.getItem('pretitan_v5');
    if(raw){const d=JSON.parse(raw);TRACKS=d.tracks||clone(DT);ROLES=d.roles||clone(DR);prog=d.prog||{};}
    else{TRACKS=clone(DT);ROLES=clone(DR);prog={};}
  }catch(e){TRACKS=clone(DT);ROLES=clone(DR);prog={};}
}
function persist(){try{localStorage.setItem('pretitan_v5',JSON.stringify({tracks:TRACKS,roles:ROLES,prog}));}catch(e){}}
function clone(x){return JSON.parse(JSON.stringify(x));}

// ── CALC ──────────────────────────────────────────────────────────────────────
function pk(tid,pi,ii){return tid+':'+pi+':'+ii;}
function trackStats(tid){
  const t=TRACKS.find(x=>x.id===tid);
  if(!t)return{total:0,done:0,pct:0};
  let total=0,done=0;
  t.phases.forEach((p,pi)=>p.items.forEach((_,ii)=>{total++;if(isDone(pk(tid,pi,ii)))done++;}));
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function allStats(){
  let total=0,done=0;const bt={};
  TRACKS.forEach(t=>{const s=trackStats(t.id);bt[t.id]=s;total+=s.total;done+=s.done;});
  return{total,done,pct:total?Math.round(done/total*100):0,bt};
}
function roleOk(role,bt){
  const results=role.reqs.map(r=>{const d=bt[r.tid];const a=d?d.pct:0;return{met:a>=r.pct,a,r};});
  return{unlocked:results.every(x=>x.met),partial:results.some(x=>x.met),results};
}

function go(v){
  view=v;
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.v===v));
  const c=document.getElementById('content');
  c.innerHTML='';
  document.getElementById('hdr-a').innerHTML='';
  if(v==='dash'){set('Dashboard','PRE-TITAN training program');renderDash();}
  else if(v.startsWith('track:')){
    const t=TRACKS.find(x=>x.id===v.split(':')[1]);
    set(t?t.title:'Track','Track progress');if(t)renderTrack(t.id);

  else if(v==='doctrine'){set('TITAN Doctrine','Architecture map — click any node to navigate');renderDoctrine();}
  else if(v==='admin'){set('Admin','Curriculum editor — import & export');renderAdmin();}
}

      <span style="font-size:9px;font-weight:600;font-family:var(--mono);color:${col};opacity:.7">${r.abbr}</span>
    </div>`;
  });
  h+=`</div>
    </div>
  </div>

  <!-- Row 4: full-width career path detail -->
  <div class="sec">Career path</div>
  <div class="rgrid" style="margin-bottom:24px">`;

  nxtShown=false;
  ROLES.forEach(r=>{
    const s=roleOk(r,bt);
    const isNext=!s.unlocked&&!nxtShown;if(isNext)nxtShown=true;
    const cls=s.unlocked?'unlocked':isNext?'next':'locked';
    h+=`<div class="rc ${cls}">
      <div class="rc-header"><span class="rc-abbr">${r.abbr}</span>
        <span class="rc-status" style="color:${s.unlocked?'var(--green)':isNext?'var(--accent)':'var(--text3)'}">${s.unlocked?'Unlocked':isNext?'Next':'Locked'}</span>
      </div>
      <div class="rc-name">${r.name}</div>
      <div class="rc-desc">${r.desc}</div>
      <div class="rc-reqs">`;
    s.results.forEach(res=>{
      const fill=res.r.pct?Math.round(Math.min(res.a,res.r.pct)/res.r.pct*100):0;
      h+=`<div class="req-row">
        <div class="req-meta${res.met?' met':isNext?' active':''}">
          <span>${res.r.lbl}</span><span style="font-family:var(--mono)">${res.a}%</span>
        </div>
        <div class="req-bar"><div class="req-barf" style="width:${fill}%;background:${res.met?'var(--green)':isNext?'var(--accent)':'var(--border2)'}"></div></div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>

  <!-- Row 5: gaps -->
  <div class="sec" id="gaps-section">Gaps <span id="gap-badge" style="font-size:10px;font-family:var(--mono);font-weight:700;padding:1px 7px;border-radius:4px;background:var(--rdim);color:var(--red);margin-left:6px">${gaps.length>0?gaps.length:''}</span></div>`;

  if(gaps.length===0){
    h+=`<div style="padding:20px 0;text-align:center;color:var(--text3);font-size:12px">
      No gaps yet. Tick items in a track and rate your confidence — anything below Solid appears here.
    </div>`;
  } else {
    h+=`<div style="margin-bottom:24px">`;
    // Group by confidence level: shaky first
    const shaky=gaps.filter(g=>g.conf===1), unsure=gaps.filter(g=>g.conf===2);
    if(shaky.length){
      h+=`<div style="font-size:10px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Shaky — needs re-work</div>`;
      shaky.forEach(g=>{
        const t=TRACKS.find(x=>x.id===g.trackId);
        h+=`<div class="gap-item">
          <div class="gap-dot shaky"></div>
          <div class="gap-body"><div class="gap-name">${esc(g.item)}</div><div class="gap-track">${t?t.title:g.trackId} &middot; ${t?.phases[g.pi]?.name||''}</div></div>
          <div class="gap-conf conf-shaky">Shaky</div>
        </div>`;
      });
    }
    if(unsure.length){
      h+=`<div style="font-size:10px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 6px">Unsure — revisit soon</div>`;
      unsure.forEach(g=>{
        const t=TRACKS.find(x=>x.id===g.trackId);
        h+=`<div class="gap-item">
          <div class="gap-dot partial"></div>
          <div class="gap-body"><div class="gap-name">${esc(g.item)}</div><div class="gap-track">${t?t.title:g.trackId} &middot; ${t?.phases[g.pi]?.name||''}</div></div>
          <div class="gap-conf conf-unsure">Unsure</div>
        </div>`;
      });
    }
    h+=`</div>`;
  }

  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}

function renderTrack(tid){
  const t=TRACKS.find(x=>x.id===tid);if(!t)return;
  const d=trackStats(tid);
  let h=`<div class="page-enter">
  <div class="big-prog" style="border-color:${t.color}22;background:${t.color}06">
    <div class="bp-top">
      <div class="bp-lbl" style="color:${t.color}">${t.title}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="bp-nums">${d.done} / ${d.total} &nbsp; <span style="color:${t.color}">${d.pct}%</span></div>
        ${d.done>0?`<button class="btn btn-sm btn-red" onclick="resetTrack('${tid}')">Reset track</button>`:''}
      </div>
    </div>
    <div class="bb"><div class="bbf" style="width:${d.pct}%;background:linear-gradient(90deg,${t.color},${t.color}88)"></div></div>
  </div>`;
  t.phases.forEach((p,pi)=>{
    let pD=0;p.items.forEach((_,ii)=>{if(prog[pk(tid,pi,ii)])pD++;});
    const pid='ph_'+tid+'_'+pi,io=!!openPh[pid],pp=p.items.length?Math.round(pD/p.items.length*100):0;
    h+=`<div class="pw">
      <div class="ph" onclick="tph('${pid}')">
        <div class="ph-dot${pD===p.items.length&&pD>0?' done':pD>0?' partial':''}" id="dot_${pid}"></div>
        <div class="ph-name">${p.name}</div>
        <div class="ph-cnt" id="cnt_${pid}">${pD}/${p.items.length}</div>
        <div class="ph-chv${io?' open':''}" id="chv_${pid}">&#9658;</div>
      </div>
      <div class="ph-bar${pD>0?' vis':''}" id="pb_${pid}">
        <div class="ph-barf${pD===p.items.length&&pD>0?' done':''}" id="pbf_${pid}" style="width:${pp}%"></div>
      </div>
      <div class="labs${io?' open':''}" id="labs_${pid}">`;
    p.items.forEach((item,ii)=>{
      const k=pk(tid,pi,ii),ks=k.replace(/:/g,'_'),on=isDone(k);
      h+=`<div class="lab" onclick="tog('${tid}',${pi},${ii})">
        <div class="chk${on?' on':''}" id="chk_${ks}"></div>
        <div class="ln${on?' done':''}" id="lbl_${ks}">${esc(item)}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}

function tph(pid){
  openPh[pid]=!openPh[pid];
  const l=document.getElementById('labs_'+pid),c=document.getElementById('chv_'+pid);
  if(l)l.className='labs'+(openPh[pid]?' open':'');
  if(c)c.className='ph-chv'+(openPh[pid]?' open':'');
}

function tog(tid,pi,ii,skipConf){
  const k=pk(tid,pi,ii);
  const wasOn=isDone(k);
  setDone(k,!wasOn);persist();
  const ks=k.replace(/:/g,'_');
  const chk=document.getElementById('chk_'+ks),lbl=document.getElementById('lbl_'+ks);
  if(chk)chk.className='chk'+(isDone(k)?' on':'');
  if(lbl)lbl.className='ln'+(isDone(k)?' done':'');
  if(!wasOn&&!skipConf){
    const t=TRACKS.find(x=>x.id===tid);
    const item=t?.phases[pi]?.items[ii]||'';
    showConfPopup(k,item,chk);
  }
  const p=TRACKS.find(x=>x.id===tid)?.phases[pi];
  if(p){
    let pD=0;p.items.forEach((_,jj)=>{if(isDone(pk(tid,pi,jj)))pD++;});
    const pid='ph_'+tid+'_'+pi,pp=p.items.length?Math.round(pD/p.items.length*100):0;
    const dot=document.getElementById('dot_'+pid),cnt=document.getElementById('cnt_'+pid);
    const pb=document.getElementById('pb_'+pid),pbf=document.getElementById('pbf_'+pid);
    if(dot)dot.className='ph-dot'+(pD===p.items.length&&pD>0?' done':pD>0?' partial':'');
    if(cnt)cnt.textContent=pD+'/'+p.items.length;
    if(pb)pb.className='ph-bar'+(pD>0?' vis':'');
    if(pbf){pbf.style.width=pp+'%';pbf.className='ph-barf'+(pD===p.items.length&&pD>0?' done':'');}
  }
  refreshBadges();checkUnlock();
}


function showConfPopup(k, itemName, anchorEl){
  // Remove any existing popup
  const old=document.getElementById('conf-popup');if(old)old.remove();
  const popup=document.createElement('div');
  popup.className='conf-popup';popup.id='conf-popup';
  const curConf=getConf(k);
  popup.innerHTML=`
    <div class="conf-title">${esc(itemName.length>40?itemName.slice(0,38)+'...':itemName)}</div>
    <div class="conf-sub">How confident are you with this?</div>
    <div class="conf-levels">
      <button class="cl-btn l1${curConf===1?' sel':''}" onclick="pickConf('${k}',1)">Shaky</button>
      <button class="cl-btn l2${curConf===2?' sel':''}" onclick="pickConf('${k}',2)">Unsure</button>
      <button class="cl-btn l3${curConf===3?' sel':''}" onclick="pickConf('${k}',3)">Solid</button>
      <button class="cl-btn l4${curConf===4?' sel':''}" onclick="pickConf('${k}',4)">Owned</button>
    </div>`;
  // Position near anchor
  if(anchorEl){
    const rect=anchorEl.getBoundingClientRect();
    const top=Math.min(rect.bottom+8, window.innerHeight-160);
    const left=Math.min(rect.left, window.innerWidth-276);
    popup.style.top=top+'px';popup.style.left=Math.max(8,left)+'px';
  } else {
    popup.style.top='50%';popup.style.left='50%';popup.style.transform='translate(-50%,-50%)';
  }
  document.body.appendChild(popup);
  // Auto-dismiss after 6s if no pick
  popup._timer=setTimeout(()=>dismissConf(),6000);
  // Click outside to dismiss
  setTimeout(()=>{document.addEventListener('click',outsideConf,{once:true,capture:true});},50);
}
function outsideConf(e){if(!document.getElementById('conf-popup')?.contains(e.target))dismissConf();}
function dismissConf(){
  const p=document.getElementById('conf-popup');
  if(!p)return;p.classList.add('out');
  clearTimeout(p._timer);
  setTimeout(()=>p.remove(),150);
}
function pickConf(k,c){
  setConf(k,c);persist();dismissConf();
  // Re-render gap badge if on dashboard
  if(view==='dash') renderGapBadge();
}

function gapStats(){
  const gaps=[];
  TRACKS.forEach(t=>{
    t.phases.forEach((p,pi)=>{
      p.items.forEach((item,ii)=>{
        const k=pk(t.id,pi,ii);
        if(isDone(k)){
          const c=getConf(k);
          if(c&&c<=2) gaps.push({k,item,conf:c,track:t.title,trackId:t.id,pi,ii});
        }
      });
    });
  });
  return gaps;
}

function renderGapBadge(){
  const gaps=gapStats();
  const el=document.getElementById('gap-badge');
  if(el)el.textContent=gaps.length>0?gaps.length:'';
}

function checkUnlock(){
  const {bt}=allStats();
  const now=ROLES.filter(r=>roleOk(r,bt).unlocked).length;
  if(now>_prevUnlocked){const r=ROLES.filter(x=>roleOk(x,bt).unlocked)[now-1];if(r)toast('Role unlocked: '+r.name);}
  _prevUnlocked=now;
}

function resetTrack(tid){
  const t=TRACKS.find(x=>x.id===tid);if(!t)return;
  const d=trackStats(tid);
  modal(`<div class="modal-title" style="color:var(--red)">Reset track progress</div>

    <div class="step-row"><div class="sdot active" id="rt-sd1">1</div><div class="sline"></div><div class="sdot" id="rt-sd2">2</div></div>

      <div class="danger-stats">Completed: <b>${d.done}</b> &nbsp; Total: <b>${d.total}</b></div></div>

function rtStep2(tid){
  document.getElementById('rt-step1').style.display='none';
  document.getElementById('rt-step2').style.display='block';

function doResetTrack(tid){
  Object.keys(prog).forEach(k=>{if(k.startsWith(tid+':'))delete prog[k];});

function activateSection(id){
  // Deactivate all nodes (transitions handled by CSS .6s ease)
  DOC_SECTIONS.forEach(s=>{
    const btn=document.getElementById('mn_'+s.id);
    const num=document.getElementById('mnum_'+s.id);
    const title=btn?.querySelector('.map-node-title');
    if(btn){btn.classList.remove('active');btn.style.background='';btn.style.borderColor='';}
    if(num){num.style.background='var(--bg5)';num.style.color='var(--text3)';num.style.boxShadow='';}
    if(title)title.style.color='';
  });

  const sec=DOC_SECTIONS.find(x=>x.id===id);
  const btn=document.getElementById('mn_'+id);
  const num=document.getElementById('mnum_'+id);
  const title=btn?.querySelector('.map-node-title');

  if(btn&&sec){
    btn.classList.add('active');
    // Delay the color fill slightly so the deactivation finishes first
    setTimeout(()=>{
      btn.style.background=sec.color+'14';
      btn.style.borderColor=sec.color+'55';
    },40);
  }
  if(num&&sec){
    setTimeout(()=>{
      num.style.background=sec.color;
      num.style.color='#fff';
      num.style.boxShadow='0 0 10px '+sec.color+'66';
    },80);
  }
  if(title&&sec){
    setTimeout(()=>{title.style.color=sec.color;},60);
  }

  // Scroll the doc panel with a brief delay so the node animation plays first
  const target=document.getElementById('sec_'+id);
  if(target){
    setTimeout(()=>{
      target.scrollIntoView({behavior:'smooth',block:'start'});
    },120);

    // Slow heading highlight — fade in, hold, fade out
    setTimeout(()=>{
      target.style.transition='background 0.5s ease, padding-left 0.5s ease';
      target.style.background=(sec?sec.color:'#5b8dee')+'1a';
      target.style.paddingLeft='10px';
      target.style.borderLeft='2px solid '+(sec?sec.color:'#5b8dee');
      setTimeout(()=>{
        target.style.transition='background 1.2s ease, padding-left 0.8s ease, border-left 0.8s ease';
        target.style.background='';
        target.style.paddingLeft='';
        target.style.borderLeft='';
      },1800);
    },400);
  }
}

function mdToHtml(md){
  return md
    .replace(/^# (.*)/gm,'<h1>$1</h1>')
    .replace(/^## (§[\d\.\s]+.*)/gm,'<h2>$1</h2>')
    .replace(/^## (.*)/gm,'<h2>$1</h2>')
    .replace(/^### (.*)/gm,'<h3>$1</h3>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr/>')
    .replace(/^- (.*)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>')
    .replace(/(\|[^\n]+\|\n)((?:\|[-:| ]+\|\n))((?:\|[^\n]+\|\n?)*)/g,(_,hdr,_sep,body)=>{
      const row=(r,tag)=>r.trim().split('|').filter((_,i,a)=>i>0&&i<a.length-1)
        .map(c=>`<${tag}>${c.trim()}</${tag}>`).join('');
      const rows=body.trim().split('\n').filter(Boolean).map(r=>`<tr>${row(r,'td')}</tr>`).join('');
      return`<table><thead><tr>${row(hdr,'th')}</tr></thead><tbody>${rows}</tbody></table>`;
    })
    .replace(/\n\n([^<\n])/g,'\n<p>$1')
    .replace(/([^>\n])\n\n/g,'$1</p>\n');
}

function modal(html){
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal-bg';
  bg.innerHTML='<div class="modal">'+html+'</div>';
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});
  document.body.appendChild(bg);
}
function closeModal(){const m=document.getElementById('modal-bg');if(m)m.remove();}

function openEditTrack(ti){
  const t=TRACKS[ti];
  modal(`<div class="modal-title">Edit track</div><div class="modal-sub">Update name, abbreviation or colour.</div>
    <div class="fl"><div class="fl-lbl">Name</div><input id="m-n" value="${esc(t.title)}"/></div>
    <div class="fl"><div class="fl-lbl">Abbreviation</div><input id="m-i" value="${esc(t.icon)}" maxlength="4" style="width:80px"/></div>
    <div class="fl"><div class="fl-lbl">Color</div><input type="color" id="m-c" value="${t.color}" style="width:60px;height:32px;padding:2px 4px"/></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-accent" onclick="saveTrack(${ti})">Save</button></div>`);
}
function saveTrack(ti){
  TRACKS[ti].title=document.getElementById('m-n').value.trim()||TRACKS[ti].title;
  TRACKS[ti].icon=document.getElementById('m-i').value.trim()||TRACKS[ti].icon;
  TRACKS[ti].color=document.getElementById('m-c').value;
  persist();closeModal();toast('Track updated');renderAdmin();buildSB();
}
function delTrack(ti){
  const t=TRACKS[ti];
  const items=t.phases.reduce((a,p)=>a+p.items.length,0);
  modal(`<div class="modal-title" style="color:var(--red)">Delete track</div>
    <div class="modal-sub">Permanently removes the track and all its progress.</div>
    <div class="step-row"><div class="sdot active" id="dt-sd1">1</div><div class="sline"></div><div class="sdot" id="dt-sd2">2</div></div>
    <div id="dt-step1">
      <div class="danger-box"><p>Delete <strong style="color:var(--text)">${esc(t.title)}</strong> &mdash; ${t.phases.length} phases, ${items} items.</p></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-red" onclick="dtStep2(${ti})">Continue</button></div>
    </div>
    <div id="dt-step2" style="display:none">
      <div class="danger-box"><p>Type <strong style="color:var(--red);font-family:var(--mono)">DELETE</strong> to confirm.</p>
      <input class="type-confirm" id="dt-word" placeholder="Type DELETE" oninput="document.getElementById('dt-btn').disabled=this.value!=='DELETE'"/></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-red" id="dt-btn" disabled onclick="doDelTrack(${ti})">Delete</button></div>
    </div>`);
}
function dtStep2(ti){
  document.getElementById('dt-step1').style.display='none';
  document.getElementById('dt-step2').style.display='block';
  document.getElementById('dt-sd1').className='sdot done';
  document.getElementById('dt-sd2').className='sdot active';
  document.getElementById('dt-word').focus();
}
function doDelTrack(ti){
  const tid=TRACKS[ti].id;Object.keys(prog).forEach(k=>{if(k.startsWith(tid+':'))delete prog[k];});
  TRACKS.splice(ti,1);persist();closeModal();toast('Track deleted');renderAdmin();buildSB();
}
function openAddPhase(ti){
  modal(`<div class="modal-title">Add phase to "${esc(TRACKS[ti].title)}"</div>
    <div class="modal-sub">Enter phase name then items, one per line.</div>
    <div class="fl"><div class="fl-lbl">Phase name <span>*</span></div><input id="m-pn" placeholder="Phase 7 — Topic"/></div>
    <div class="fl"><div class="fl-lbl">Items (one per line) <span>*</span></div><textarea id="m-pi" placeholder="Lab 1&#10;Lab 2"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-accent" onclick="saveAddPhase(${ti})">Add</button></div>`);
}
function saveAddPhase(ti){
  const n=document.getElementById('m-pn').value.trim();
  const items=document.getElementById('m-pi').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!n){toast('Phase name required');return;}if(!items.length){toast('Add at least one item');return;}
  TRACKS[ti].phases.push({name:n,items});persist();closeModal();toast('Phase added');renderAdmin();
}
function openEditPhase(ti,pi){
  const p=TRACKS[ti].phases[pi];
  modal(`<div class="modal-title">Edit phase</div><div class="modal-sub">Update name and items.</div>
    <div class="fl"><div class="fl-lbl">Phase name</div><input id="m-pn" value="${esc(p.name)}"/></div>
    <div class="fl"><div class="fl-lbl">Items (one per line)</div><textarea id="m-pi" rows="8">${p.items.map(esc).join('\n')}</textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-accent" onclick="saveEditPhase(${ti},${pi})">Save</button></div>`);
}
function saveEditPhase(ti,pi){
  const n=document.getElementById('m-pn').value.trim();
  const items=document.getElementById('m-pi').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!n||!items.length){toast('Name and items required');return;}
  TRACKS[ti].phases[pi]={name:n,items};persist();closeModal();toast('Phase updated');renderAdmin();
}
function delPhase(ti,pi){
  const p=TRACKS[ti].phases[pi];
  modal(`<div class="modal-title" style="color:var(--red)">Delete phase</div>
    <div class="modal-sub">Removes ${p.items.length} items and their progress.</div>
    <div class="danger-box"><p>Delete <strong style="color:var(--text)">${esc(p.name)}</strong>?</p></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-red" onclick="doDelPhase(${ti},${pi})">Delete phase</button></div>`);
}
function doDelPhase(ti,pi){
  const tid=TRACKS[ti].id,np={};
  Object.keys(prog).forEach(k=>{
    if(!k.startsWith(tid+':')){np[k]=prog[k];return;}
    const pts=k.split(':'),p2=parseInt(pts[1]),i2=parseInt(pts[2]);
    if(p2<pi)np[k]=prog[k];
    else if(p2>pi)np[tid+':'+(p2-1)+':'+i2]=prog[k];
  });
  Object.keys(prog).forEach(k=>delete prog[k]);Object.assign(prog,np);
  TRACKS[ti].phases.splice(pi,1);persist();closeModal();toast('Phase deleted');renderAdmin();buildSB();
}
function addTrack(){
  const n=document.getElementById('nt-name').value.trim();
  if(!n){toast('Track name required');return;}
  TRACKS.push({id:'t'+Date.now(),title:n,icon:document.getElementById('nt-icon').value.trim()||'--',color:document.getElementById('nt-color').value||'#5b8dee',phases:[]});
  persist();toast('Track added');renderAdmin();buildSB();
}

// ── IMPORT / EXPORT ───────────────────────────────────────────────────────────
function doExport(){
  const {total,done,pct}=allStats();
  const payload={_meta:{exportedAt:new Date().toISOString(),v:5,total,done,pct},tracks:TRACKS,roles:ROLES,prog};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));
  a.download='PRE-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('Exported');
}
function doImport(evt){
  const file=evt.target.files[0];if(!file)return;
  const st=document.getElementById('imp-status');if(st)st.textContent='Reading...';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.tracks||!Array.isArray(d.tracks))throw new Error('Missing tracks array');
      const checks=Object.keys(d.prog||{}).filter(k=>d.prog[k]).length;
      if(!confirm('Import "'+file.name+'"?\n'+d.tracks.length+' tracks, '+checks+' checkmarks.\nThis replaces current data.'))
        {if(st)st.textContent='Cancelled.';return;}
      TRACKS=d.tracks;ROLES=d.roles||clone(DR);prog=d.prog||{};persist();
      if(st)st.textContent='Imported: '+TRACKS.length+' tracks, '+checks+' checks.';
      toast('Imported');buildSB();renderAdmin();
    }catch(err){if(st)st.textContent='Error: '+err.message;toast('Import failed');}
  };
  reader.readAsText(file);
}
function resetProg(){
  const {total,done}=allStats();
  modal(`<div class="modal-title" style="color:var(--red)">Reset progress</div>
    <div class="modal-sub">Clear all checkmarks. Curriculum stays intact.</div>
    <div class="step-row"><div class="sdot active" id="sd1">1</div><div class="sline"></div><div class="sdot" id="sd2">2</div></div>
    <div id="rp-step1">
      <div class="danger-box"><p>Clear <strong style="color:var(--text)">${done} completed items</strong> across all tracks.</p>
      <div class="danger-stats">Completed: <b>${done}</b> &nbsp; Total: <b>${total}</b></div></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-red" onclick="rpStep2()">Continue</button></div>
    </div>
    <div id="rp-step2" style="display:none">
      <div class="danger-box"><p>Type <strong style="color:var(--red);font-family:var(--mono)">RESET</strong> to confirm.</p>
      <input class="type-confirm" id="rp-word" placeholder="Type RESET" oninput="document.getElementById('rp-btn').disabled=this.value!=='RESET'"/></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-red" id="rp-btn" disabled onclick="doResetProg()">Clear all</button></div>
    </div>`);
}
function rpStep2(){
  document.getElementById('rp-step1').style.display='none';document.getElementById('rp-step2').style.display='block';
  document.getElementById('sd1').className='sdot done';document.getElementById('sd2').className='sdot active';
  document.getElementById('rp-word').focus();
}
function doResetProg(){Object.keys(prog).forEach(k=>delete prog[k]);persist();closeModal();toast('Progress cleared');buildSB();renderAdmin();}

function resetAll(){
  const checks=Object.keys(prog).filter(k=>prog[k]).length;
  modal(`<div class="modal-title" style="color:var(--red)">Restore defaults</div>
    <div class="modal-sub">Wipe all custom tracks and progress, restore original curriculum.</div>
    <div class="step-row"><div class="sdot active" id="ra-sd1">1</div><div class="sline"></div><div class="sdot" id="ra-sd2">2</div></div>
    <div id="ra-step1">
      <div class="danger-box"><p>Remove all custom changes and restore the original PRE-TITAN curriculum.</p>
      <div class="danger-stats">Tracks: <b>${TRACKS.length}</b> &nbsp; Checks: <b>${checks}</b></div></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-red" onclick="raStep2()">Continue</button></div>
    </div>
    <div id="ra-step2" style="display:none">
      <div class="danger-box"><p>Type <strong style="color:var(--red);font-family:var(--mono)">RESTORE</strong> to confirm.</p>
      <input class="type-confirm" id="ra-word" placeholder="Type RESTORE" oninput="document.getElementById('ra-btn').disabled=this.value!=='RESTORE'"/></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-red" id="ra-btn" disabled onclick="doResetAll()">Restore</button></div>
    </div>`);
}
function raStep2(){
  document.getElementById('ra-step1').style.display='none';document.getElementById('ra-step2').style.display='block';
  document.getElementById('ra-sd1').className='sdot done';document.getElementById('ra-sd2').className='sdot active';
  document.getElementById('ra-word').focus();
}
function doResetAll(){TRACKS=clone(DT);ROLES=clone(DR);Object.keys(prog).forEach(k=>delete prog[k]);persist();closeModal();toast('Restored to defaults');buildSB();go('dash');
// Restore sidebar state
try{
  if(localStorage.getItem('pt_sb_rail')==='1'){
    const sb=document.getElementById('sb');
    const btn=document.getElementById('sb-toggle');
    sb.classList.add('rail');
    if(btn) btn.innerHTML='&#9654;';
  }
}catch(e){}}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── SIDEBAR TOGGLE ────────────────────────────────────────────────────────────
function toggleSB(){
  const sb=document.getElementById('sb');
  const btn=document.getElementById('sb-toggle');
  const isRail=sb.classList.toggle('rail');
  if(btn) btn.innerHTML=isRail?'&#9654;':'&#9664;';
  try{localStorage.setItem('pt_sb_rail',isRail?'1':'0');}catch(e){}
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
load();
const {bt}=allStats();_prevUnlocked=ROLES.filter(r=>roleOk(r,bt).unlocked).length;
buildSB();go('dash');
// Restore sidebar state
try{
  if(localStorage.getItem('pt_sb_rail')==='1'){
    const sb=document.getElementById('sb');
    const btn=document.getElementById('sb-toggle');
    sb.classList.add('rail');
    if(btn) btn.innerHTML='&#9654;';
  }
}catch(e){}
</script>
</body>
